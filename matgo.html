<style>
@import url('https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css');
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#F5F1E8; --cream-2:#EDE7D7; --paper:#FBF8F0;
  --ink:#1F2A1A; --ink-2:#2D3A2A; --muted:#6B6B5C;
  --sage:#5C7A4A; --sage-deep:#3F5A30; --gold:#C9A961; --gold-soft:#E0C988;
  --felt:#3E5A3E; --felt-dark:#2E462E;
  --cw:56px; --ch:87px;   /* 바닥/AI 카드 */
  --hw:64px; --hh:100px;  /* 내 손패 카드 */
}
html,body{width:100%;overflow-x:hidden}
body{font-family:'NanumSquareRound',-apple-system,sans-serif;background:var(--cream);color:var(--ink);font-weight:700;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 10px 40px}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(245,241,232,.96);backdrop-filter:blur(8px);border-bottom:1.5px solid var(--cream-2)}
.h-title{font-family:'Nanum Myeongjo',serif;font-size:19px;font-weight:800;color:var(--sage-deep)}
.h-exit{border:1.5px solid rgba(63,90,48,.3);color:var(--sage-deep);background:#fff;font-size:13px;font-weight:700;padding:8px 14px;border-radius:50px;cursor:pointer;text-decoration:none;font-family:inherit;min-height:44px;display:inline-flex;align-items:center}

/* ── 카드 ── */
.card{width:var(--cw);height:var(--ch);border-radius:6px;background-image:url('/img/hwatu/allcard.png?v=2');background-size:400% 1200%;background-color:#fff;border:1.5px solid #B8B0A0;box-shadow:0 2px 5px rgba(0,0,0,.22);flex-shrink:0;position:relative}
.card.hand{width:var(--hw);height:var(--hh);cursor:pointer;transition:transform .14s}
.card.hand.sel{transform:translateY(-14px);border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft),0 8px 14px rgba(0,0,0,.3)}
.card.back{background-image:none;background:repeating-linear-gradient(45deg,#7A3030 0 8px,#8A3A3A 8px 16px);border-color:#5A2020}
/* 짝이 있는 손패: 네온 테두리가 강하게 깜빡이며 둥실둥실 떠 있음 */
.card.matchable::after{content:'';position:absolute;inset:-6px;border:4px solid #FFD54F;border-radius:11px;animation:mpulse .65s infinite alternate;pointer-events:none}
.card.hand.matchable:not(.sel){animation:mfloat 1.3s ease-in-out infinite}
@keyframes mpulse{
  0%{opacity:.5;box-shadow:0 0 6px #FFD54F,0 0 12px rgba(255,213,79,.5)}
  100%{opacity:1;box-shadow:0 0 14px #FFD54F,0 0 30px rgba(255,213,79,.95),inset 0 0 10px rgba(255,235,170,.5)}
}
@keyframes mfloat{0%,100%{transform:translateY(-6px)}50%{transform:translateY(-13px)}}
.card .mnum{position:absolute;top:2px;left:3px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:800;padding:1px 5px;border-radius:8px;line-height:1.3}

/* ── 상대(봄이 AI) 영역 ── */
.opp{background:var(--paper);border:1.5px solid var(--cream-2);border-radius:16px;padding:10px 12px;margin-top:10px}
.opp-head{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.bom-avatar-wrap{position:relative;flex-shrink:0}
.opp-head img{width:34px;height:34px;border-radius:50%;background:#fff;transition:transform .15s}
.bom-bubble{position:absolute;left:40px;top:-8px;min-width:150px;max-width:220px;background:#fff;border:1.5px solid var(--gold-soft);border-radius:14px 14px 14px 2px;padding:8px 12px;font-size:12.5px;line-height:1.5;color:var(--ink);box-shadow:0 6px 16px rgba(31,42,26,.18);z-index:50;opacity:0;transform:translateY(4px) scale(.94);transition:opacity .18s,transform .18s;pointer-events:none;white-space:normal}
.bom-bubble.show{opacity:1;transform:translateY(0) scale(1)}
.bom-bubble::before{content:'';position:absolute;left:-7px;bottom:6px;border:7px solid transparent;border-right-color:var(--gold-soft)}
.bom-bubble::after{content:'';position:absolute;left:-5.5px;bottom:7px;border:6px solid transparent;border-right-color:#fff}
.opp-head .nm{font-size:14px;color:var(--ink)}
.opp-head .sc{margin-left:auto;font-size:15px;font-weight:800;color:var(--sage-deep)}
/* 고/흔들기 배지 — 별도 줄 없이 이름 옆에 붙여서 빈 줄 낭비 없앰 */
.cap-badge{font-size:11.5px;font-weight:800;white-space:nowrap}
/* 줄바꿈 대신 가로 스크롤로 고정 높이 유지 (여백은 최소화) */
.cap-strip{display:flex;gap:6px;margin-top:2px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;height:48px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.cap-strip .card{width:26px;height:40px;border-radius:3px;flex-shrink:0}
/* 획득 패는 실제 화투처럼 광/열끗/띠/피 그룹으로 모아둠 */
.cap-group{display:flex;align-items:center;gap:2px;background:rgba(63,90,48,.07);border:1px solid var(--cream-2);border-radius:8px;padding:3px 6px;flex-shrink:0}
.cap-lbl{font-size:10px;font-weight:800;color:var(--muted);margin-right:3px;white-space:nowrap}
/* 봄이 손패 뒷면 */
.opp-backs{display:flex;gap:2px;flex-wrap:wrap}
.opp-backs .b{width:18px;height:28px;border-radius:3px;background:repeating-linear-gradient(45deg,#7A3030 0 5px,#8A3A3A 5px 10px);border:1px solid #5A2020}
/* 날아가는 카드 */
.fly{position:fixed;left:0;top:0;margin:0;z-index:600;pointer-events:none;box-shadow:0 8px 18px rgba(0,0,0,.35)}
/* 더미에서 뒤집은 패 공개 연출 (3D 플립) */
.rv{position:fixed;left:0;top:0;margin:0;z-index:650;pointer-events:none;perspective:700px}
.rv-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s ease}
.rv-inner.flipped{transform:rotateY(180deg)}
.rv-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:8px;box-shadow:0 10px 24px rgba(0,0,0,.4)}
.rv-back{background:repeating-linear-gradient(45deg,#7A3030 0 8px,#8A3A3A 8px 16px);border:1.5px solid #5A2020}
.rv-front{transform:rotateY(180deg);background-image:url('/img/hwatu/allcard.png?v=2');background-size:400% 1200%;background-color:#fff;border:1.5px solid #B8B0A0}
/* 내리치기: 착지 카드 펀치 + 판 전체 흔들림 */
.card.slam{animation:slamIn .22s ease-out}
@keyframes slamIn{0%{transform:scale(1.5)}55%{transform:scale(.94)}100%{transform:scale(1)}}
.board.bshake{animation:bshake .18s ease-out}
@keyframes bshake{25%{transform:translateY(1.5px)}55%{transform:translateY(-1px)}100%{transform:translateY(0)}}

/* ── 바닥판 ── */
.board{background:radial-gradient(circle at center,var(--felt),var(--felt-dark));border:6px solid #8A6A3A;border-radius:18px;padding:14px 10px;margin-top:10px;min-height:230px;position:relative}
.floor{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:flex-start;min-height:190px}
.fslot{position:relative;width:var(--cw);height:var(--ch)}
.fslot .card{position:absolute;top:0;left:0}
.fslot .card:nth-child(2){top:14px;left:8px}
.fslot .card:nth-child(3){top:28px;left:16px}
.fslot .card:nth-child(4){top:42px;left:24px}
.fslot.stack3{margin-bottom:30px;margin-right:16px}
.deck{position:absolute;right:10px;bottom:10px;text-align:center}
.deck .card{margin:0 auto}
.deck .dn{color:#EFE6D0;font-size:11px;margin-top:3px}
.turnmsg{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.45);color:#FBF8F0;font-size:12.5px;padding:6px 12px;border-radius:50px;max-width:60%}

/* ── 내 영역 ── */
.mine{background:var(--paper);border:1.5px solid var(--cream-2);border-radius:16px;padding:10px 12px;margin-top:10px}
.mine-head{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.my-stats{height:22px;overflow:hidden;margin-top:6px;font-size:12px;font-weight:800;color:var(--sage-deep);background:rgba(63,90,48,.07);border-radius:10px;padding:3px 10px;text-align:center;white-space:nowrap;text-overflow:ellipsis}
.mine-head .nm{font-size:14px}
.mine-head .sc{margin-left:auto;font-size:17px;font-weight:800;color:var(--sage-deep)}
.hand-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:12px 2px 6px}
.gobtn-row{display:flex;gap:10px;margin-top:10px}
.gobtn{flex:1;min-height:52px;border:none;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit}
.gobtn.go{background:linear-gradient(to bottom,#C05050,#A03A3A);color:#fff;box-shadow:0 4px 0 #7A2A2A}
.gobtn.stop{background:linear-gradient(to bottom,#6E9257,#4B6B3B);color:#fff;box-shadow:0 4px 0 var(--sage-deep)}
.gobtn:active{transform:translateY(3px);box-shadow:none}

/* ── 모달 ── */
.mm-overlay{position:fixed;inset:0;background:rgba(31,42,26,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.mm-overlay.on{display:flex}
.mm-box{background:var(--paper);border-radius:20px;width:100%;max-width:400px;padding:24px 20px;text-align:center;box-shadow:0 20px 50px rgba(31,42,26,.4);max-height:86vh;overflow-y:auto}
.mm-title{font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:800;color:var(--sage-deep);margin-bottom:10px}
.mm-body{font-size:15px;line-height:1.75;color:var(--ink-2);margin-bottom:16px}
.mm-body .big{font-size:34px;display:block;margin:6px 0}
.mm-btn{display:block;width:100%;min-height:50px;border:none;border-radius:14px;background:var(--sage);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px}
.mm-btn.sub{background:#fff;border:1.5px solid var(--cream-2);color:var(--muted)}
.mm-score-table{width:100%;font-size:14px;margin:10px 0;border-collapse:collapse}
.mm-score-table td{padding:5px 8px;border-bottom:1px solid var(--cream-2);text-align:left}
.mm-score-table td:last-child{text-align:right;font-weight:800;color:var(--sage-deep)}
.evt-banner{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);z-index:400;background:rgba(31,42,26,.88);color:#FBF8F0;font-family:'Nanum Myeongjo',serif;font-size:34px;font-weight:800;padding:18px 44px;border-radius:20px;border:2px solid var(--gold);display:none;letter-spacing:4px;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);padding:12px 24px;font-size:14px;z-index:500;border-radius:50px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
/* 말투 선택 */
.tone-list{display:flex;flex-direction:column;gap:8px}
.tone-item{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;border:1.5px solid var(--cream-2);border-radius:14px;background:#fff;cursor:pointer;font-family:inherit;text-align:left;min-height:56px}
.tone-item.on{border-color:var(--sage);background:rgba(92,122,74,.08)}
.tone-item .te{font-size:26px;flex-shrink:0}
.tone-item .tl{display:flex;flex-direction:column;line-height:1.3;flex:1}
.tone-item .tl b{font-size:15px;color:var(--ink)}
.tone-item .tl span{font-size:12px;color:var(--muted)}
.tone-item .tk{color:var(--sage);font-weight:800;font-size:18px}

/* ── 모바일: 한 화면에 모든 플레이 요소가 들어오도록 축소 ── */
@media (max-width:480px){
  :root{
    --cw:40px; --ch:62px;   /* 바닥/AI 카드 */
    --hw:44px; --hh:68px;   /* 내 손패 카드 */
  }
  .wrap{padding:0 8px 10px}
  header{padding:6px 12px}
  .h-title{font-size:17px}
  .h-exit{font-size:12px;padding:6px 11px;min-height:38px}

  .opp{padding:7px 10px;margin-top:7px}
  .opp-head{margin-bottom:2px}
  .opp-head img{width:28px;height:28px}
  .opp-head .nm{font-size:13px}
  .opp-head .sc{font-size:14px}
  .opp-backs .b{width:13px;height:20px}
  .cap-strip{height:38px;margin-top:2px}
  .cap-strip .card{width:21px;height:32px}
  .cap-group{padding:2px 5px}
  .cap-lbl{font-size:9px}

  .board{padding:7px;margin-top:7px;min-height:auto;border-width:5px}
  .floor{min-height:118px;gap:5px}
  .fslot .card:nth-child(2){top:10px;left:5px}
  .fslot .card:nth-child(3){top:20px;left:10px}
  .fslot .card:nth-child(4){top:30px;left:15px}
  .deck .card{width:36px;height:56px}
  .deck .dn{font-size:10px;margin-top:2px}
  .turnmsg{font-size:11px;padding:4px 9px}

  .mine{padding:7px 10px;margin-top:7px}
  .mine-head{margin-bottom:2px}
  .mine-head .nm{font-size:13px}
  .mine-head .sc{font-size:15px}
  .my-stats{font-size:11px;height:19px;margin-top:3px;padding:2px 8px}
  .hand-row{gap:4px;padding:6px 2px 2px}

  .bom-bubble{min-width:130px;max-width:180px;font-size:12px;padding:7px 10px}
}
</style>
<script src="/a11y.js?v=7" defer></script>
<script src="/dasibom-kiosk-usage.js" defer></script>

<body>
<!-- 공용 헤더: 왼쪽 [← 홈으로] / 오른쪽 [카드 제목] — 안쪽은 dasibom-header.js가 채움.
     음악/효과음/말투 버튼은 data-dbh-keep 이라 홈버튼과 제목 사이에 그대로 남음. -->
<header data-dasibom-header data-title="🎴 봄이와 맞고" data-accent="#3F5A30">
  <span style="display:flex;gap:8px" data-dbh-keep>
    <button class="h-exit" id="toneBtn" onclick="openTonePicker()" aria-label="봄이 말투">🗣️</button>
    <button class="h-exit" id="bgmBtn" onclick="toggleBgm()" aria-label="배경음악">🎵</button>
    <button class="h-exit" id="sndBtn" onclick="toggleSnd()" aria-label="효과음">🔊</button>
  </span>
</header>

<div class="wrap">
  <!-- 상대 (봄이) -->
  <div class="opp">
    <div class="opp-head">
      <span class="bom-avatar-wrap">
        <img id="bomFaceImg" src="/img/bom_smile.png" alt="봄이" onerror="this.style.display='none'">
        <div class="bom-bubble" id="bomBubble"></div>
      </span>
      <span class="nm">봄이</span>
      <span class="cap-badge" id="oppCaps"></span>
      <span class="sc" id="oppScore">0점</span>
    </div>
    <div class="cap-strip" id="oppStrip"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
      <div class="opp-backs" id="oppBacks"></div>
      <span style="font-size:11.5px;color:var(--muted)"><b id="oppHandN">10</b>장 남음</span>
    </div>
  </div>

  <!-- 바닥 -->
  <div class="board">
    <div class="floor" id="floor"></div>
    <div class="deck"><div class="card back"></div><div class="dn"><span id="deckN">24</span>장</div></div>
    <div class="turnmsg" id="turnMsg">패를 골라주세요</div>
  </div>

  <!-- 나 -->
  <div class="mine">
    <div class="mine-head">
      <span class="nm">😊 나</span>
      <span class="cap-badge" id="myCaps"></span>
      <span class="sc" id="myScore">0점</span>
    </div>
    <div class="cap-strip" id="myStrip"></div>
    <div class="hand-row" id="hand"></div>
    <div class="my-stats" id="myStats">🏅 Lv.1 화투 새내기 · 0P · 0승 0패</div>
  </div>
</div>

<!-- 이벤트 배너 (뻑! 쪽! 등) -->
<div class="evt-banner" id="evtBanner"></div>

<!-- 같은 달 패 선택 오버레이 -->
<div class="mm-overlay" id="chOverlay">
  <div class="mm-box">
    <div class="mm-title">어느 패를 가져올까요?</div>
    <div class="mm-body">바닥에 같은 달 패가 두 장 있어요.<br>가져오고 싶은 패를 눌러주세요.</div>
    <div id="chCards" style="display:flex;gap:18px;justify-content:center;padding:6px 0 4px"></div>
  </div>
</div>

<!-- 봄이 말투 선택 -->
<div class="mm-overlay" id="toneOverlay" onclick="if(event.target===this)this.classList.remove('on')">
  <div class="mm-box" style="max-width:340px">
    <div class="mm-title">봄이 말투 고르기</div>
    <div class="mm-body" style="margin-bottom:10px">어떤 손녀로 함께할까요?<br><span style="font-size:12.5px;color:var(--muted)">언제든 다시 바꿀 수 있어요</span></div>
    <div id="toneList" class="tone-list"></div>
  </div>
</div>

<!-- 공용 모달 -->
<div class="mm-overlay" id="mmOverlay">
  <div class="mm-box">
    <div class="mm-title" id="mmTitle"></div>
    <div class="mm-body" id="mmBody"></div>
    <div id="mmBtns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   봄이와 맞고 — 2인(나 vs 봄이 AI)
   화투 이미지: sunduk/freegostop 오픈소스(상업적 사용 자유)
   룰: 표준 맞고 7점 기준. 흔들기·폭탄·뻑·쪽·따닥·싹쓸이·피박·광박·고박 포함.

/* ── 카드 데이터 ──
   스프라이트: 4열×12행, 위에서부터 12월→1월. col은 시트상의 위치. */
var TYPES = { KWANG:'광', YEOL:'열끗', TTI:'띠', PI:'피', SSANGPI:'쌍피' };
var MONTH_DEF = {
  1:  [['KWANG'],['TTI','hong'],['PI'],['PI']],
  2:  [['YEOL','godori'],['TTI','hong'],['PI'],['PI']],
  3:  [['KWANG'],['TTI','hong'],['PI'],['PI']],
  4:  [['YEOL','godori'],['TTI','cho'],['PI'],['PI']],
  5:  [['YEOL'],['TTI','cho'],['PI'],['PI']],
  6:  [['YEOL'],['TTI','chung'],['PI'],['PI']],
  7:  [['YEOL'],['TTI','cho'],['PI'],['PI']],
  8:  [['KWANG'],['YEOL','godori'],['PI'],['PI']],
  9:  [['YEOL','kukjin'],['TTI','chung'],['PI'],['PI']],
  10: [['YEOL'],['TTI','chung'],['PI'],['PI']],
  11: [['KWANG'],['SSANGPI'],['PI'],['PI']],
  12: [['KWANG','bi'],['YEOL'],['TTI','bi'],['SSANGPI']]
};
function buildDeck(){
  var deck=[];
  for(var m=1;m<=12;m++){
    MONTH_DEF[m].forEach(function(def,col){
      deck.push({ month:m, type:def[0], tag:def[1]||null, col:col, id:m+'-'+col });
    });
  }
  return deck;
}
/* 난수: 브라우저 암호학적 난수(crypto) 우선 — Math.random 편향 의심 원천 차단 */
function rnd(){
  if(window.crypto && crypto.getRandomValues){
    var u=new Uint32Array(1); crypto.getRandomValues(u);
    return u[0]/4294967296;
  }
  return Math.random();
}
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(rnd()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

/* 스프라이트 위치: 컬러 시트는 1월이 맨 위 (행 = month-1). 카드에 숫자 인쇄돼 있음 */
function cardStyle(c){
  var row = c.month - 1;
  var x = (c.col/3)*100, y = (row/11)*100;
  return 'background-position:'+x+'% '+y+'%';
}
function cardEl(c, cls){
  var d=document.createElement('div');
  d.className='card'+(cls?' '+cls:'');
  d.style.cssText=cardStyle(c);
  if(HIDE_IDS[c.id]) d.style.visibility='hidden';
  d.dataset.id=c.id;
  return d;
}

var LEVELS=[
  [0,'화투 새내기'],[30,'피 모으기 달인'],[80,'띠 수집가'],[150,'고도리 사냥꾼'],
  [250,'광 부자'],[400,'쓰리고 도전자'],[600,'동네 고수'],[850,'사랑방 지존'],
  [1150,'화투 명인'],[1500,'화투 신선']
];
function levelOf(pts){
  var lv=1,name=LEVELS[0][1],next=null;
  for(var i=0;i<LEVELS.length;i++){
    if(pts>=LEVELS[i][0]){ lv=i+1; name=LEVELS[i][1]; next=LEVELS[i+1]?LEVELS[i+1][0]:null; }
  }
  return {lv:lv,name:name,next:next};
}
var STATS={points:0,wins:0,losses:0,draws:0};
try{ var s=JSON.parse(localStorage.getItem('matgo_stats')); if(s) STATS=s; }catch(e){}

  statsFB().then(function(uid){
    if(!uid) return;
    firebase.firestore().collection('game_stats').doc(uid)
      .set({ matgo: STATS, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge:true })

}

/* ── 효과음 (Web Audio 합성 — 파일 없이 즉시 재생) ── */
var AC=null, SND_ON=true;
try{ SND_ON=localStorage.getItem('matgo_snd')!=='0'; }catch(e){}

  SND_ON=!SND_ON;

  document.getElementById('sndBtn').textContent=SND_ON?'🔊':'🔇';
  if(SND_ON) sfx('click');

function ac(){
  if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function tone(freq,type,dur,vol,when){
  var ctx=ac(), o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,when);
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(vol,when+.012);
  g.gain.exponentialRampToValueAtTime(.001,when+dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(when); o.stop(when+dur+.02);
}
function noiseBurst(dur,vol,when,freq){
  var ctx=ac(), len=Math.max(1,Math.floor(ctx.sampleRate*dur));
  var buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
  for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
  var src=ctx.createBufferSource(); src.buffer=buf;
  var f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.setValueAtTime(freq,when); f.Q.value=0.9;
  var g=ctx.createGain();
  g.gain.setValueAtTime(vol,when);
  g.gain.exponentialRampToValueAtTime(.001,when+dur);
  src.connect(f); f.connect(g); g.connect(ctx.destination);
  src.start(when); src.stop(when+dur+.02);
}
function sfx(n,delayMs){
  if(!SND_ON) return;
  try{
    var t=ac().currentTime+(delayMs||0)/1000;
    switch(n){
      case 'click':   tone(880,'sine',.06,.1,t); break;
      case 'tick':    noiseBurst(.025,.2,t,2800); break;                          // 배분 한 장(타닥)
      case 'pick':    tone(520,'triangle',.05,.09,t); break;                       // 패 집기
      case 'slap':    noiseBurst(.055,.5,t,2100); tone(170,'triangle',.07,.32,t); break; // 패 부딪히는 딱!
      case 'flip':    noiseBurst(.04,.22,t,3200); break;                           // 더미 뒤집기
      case 'collect': tone(660,'sine',.05,.07,t); noiseBurst(.03,.1,t,4200); break; // 획득 정렬 슥
      case 'steal':   tone(300,'sawtooth',.12,.11,t); tone(240,'sawtooth',.12,.09,t+.08); break; // 피 뺏기
      case 'event':   tone(523,'square',.09,.12,t); tone(784,'square',.13,.12,t+.09); break;     // 뻑·쪽·따닥
      case 'go':      tone(392,'square',.1,.14,t); tone(523,'square',.1,.14,t+.1); tone(659,'square',.2,.14,t+.2); break; // 고!·흔들기
      case 'deal':    for(var i=0;i<9;i++) noiseBurst(.028,.16,t+i*.055,3000); break;             // 패 돌리기
      case 'win':     [523,659,784,1047].forEach(function(f,i){tone(f,'triangle',.24,.18,t+i*.13);}); break;
      case 'lose':    [392,330,262].forEach(function(f,i){tone(f,'sine',.32,.16,t+i*.18);}); break;
      case 'draw':    tone(440,'sine',.25,.13,t); tone(440,'sine',.25,.1,t+.3); break;
    }
  }catch(e){}
}

   상태는 즉시 바꾸되, 바뀐 자리의 카드를 잠시 숨기고
   복제 카드를 출발 위치→도착 위치로 날려서 손맛을 살린다. */
var HIDE_IDS={};
function rectOf(el){ var r=el.getBoundingClientRect(); return {x:r.left,y:r.top,w:r.width,h:r.height}; }

  var bk=document.getElementById('oppBacks');

}

/* 더미 패 공개: 더미→판 중앙으로 커지며 이동 → 3D로 뒤집어 공개 → 1.5초 보여주기 → cb(중앙 rect) */
function revealFlip(card, fromRect, cb){
  sfx('flip');
  var W=88, H=137;
  var br=document.querySelector('.board').getBoundingClientRect();
  var cx=br.left+br.width/2-W/2, cy=br.top+br.height/2-H/2;
  var wrap=document.createElement('div'); wrap.className='rv';
  wrap.style.width=fromRect.w+'px'; wrap.style.height=fromRect.h+'px';
  wrap.style.transform='translate('+fromRect.x+'px,'+fromRect.y+'px)';
  wrap.style.transition='transform .28s ease, width .28s ease, height .28s ease';
  var inner=document.createElement('div'); inner.className='rv-inner';
  var back=document.createElement('div'); back.className='rv-face rv-back';
  var front=document.createElement('div'); front.className='rv-face rv-front';
  front.style.cssText+=';'+cardStyle(card);
  inner.appendChild(back); inner.appendChild(front); wrap.appendChild(inner);
  document.body.appendChild(wrap);
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    wrap.style.transform='translate('+cx+'px,'+cy+'px)';
    wrap.style.width=W+'px'; wrap.style.height=H+'px';
  });});
  setTimeout(function(){ inner.classList.add('flipped'); sfx('pick'); }, 300);
  setTimeout(function(){
    // wrap은 제거하지 않고 호출자에게 넘김 — 바닥으로 이어지는 연속 이동에 재사용
    cb({x:cx,y:cy,w:W,h:H}, wrap);
  }, 300+1200); // 뒤집기 포함 1.2초간 보여주고 진행
}

function flyClone(card, from, to, ms, cb, back){
  if(!from||!to){ if(cb)cb(); return; }
  var el = back ? (function(){ var d=document.createElement('div'); d.className='card back'; return d; })() : cardEl(card);
  el.style.visibility='visible';
  el.classList.add('fly');
  el.style.width=from.w+'px'; el.style.height=from.h+'px';
  el.style.transform='translate('+from.x+'px,'+from.y+'px)';
  el.style.transition='transform '+ms+'ms cubic-bezier(.35,.75,.35,1), width '+ms+'ms, height '+ms+'ms';
  document.body.appendChild(el);
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    el.style.transform='translate('+to.x+'px,'+to.y+'px)';
    el.style.width=to.w+'px'; el.style.height=to.h+'px';
  });});
  setTimeout(function(){ el.remove(); if(cb)cb(); }, ms+50);
}

/* ── 게임 상태 ── */
var G=null;
function newGame(){
  // 배분: 각 10장, 바닥 8장 (2인 맞고 표준)
  // 이상한 시작(바닥에 같은 달 3장+, 손에 같은 달 4장=총통)은 실제 화투처럼 다시 섞음
  var deck, me, ai, floor, tries=0;
  do{
    deck=shuffle(buildDeck());
    me=[]; ai=[]; floor=[];
    for(var i=0;i<10;i++){ me.push(deck.pop()); ai.push(deck.pop()); }
    for(var i2=0;i2<8;i2++) floor.push(deck.pop());
    tries++;
  }while(tries<12 && badDeal(me,ai,floor));

  G={
    deck:deck,
    floor:[],                 // [{month, cards:[...]}] 달별 묶음
    me:{hand:me,cap:[],go:0,shake:0,lastGoScore:0},
    ai:{hand:ai,cap:[],go:0,shake:0,lastGoScore:0},
    turn:'me',
    over:false,
    busy:false
  };
  floor.forEach(floorAdd);
  sortHand(G.me.hand);
  dealAnimation();
}
function badDeal(me,ai,floor){
  function counts(arr){ var c={}; arr.forEach(function(x){c[x.month]=(c[x.month]||0)+1;}); return c; }
  var fm=counts(floor), mm=counts(me), am=counts(ai);
  for(var m in fm) if(fm[m]>=3) return true;   // 바닥에 같은 달 3장 이상
  for(var m2 in mm) if(mm[m2]>=4) return true; // 총통(손에 4장)
  for(var m3 in am) if(am[m3]>=4) return true;
  return false;
}
function sortHand(h){ h.sort(function(a,b){ return a.month-b.month || a.col-b.col; }); }

/* ── 패 배분 연출: 실제 맞고 순서(바닥4→상대5→나5, 두 바퀴)로 타다닥 나눠줌 ── */
function dealAnimation(){
  G.busy=true;
  // 나눠주기 전: 내 손패·바닥 전부 숨기고, 봄이 패는 0장부터 시작
  var floorCards=[]; G.floor.forEach(function(g){ g.cards.forEach(function(c){ floorCards.push(c); }); });
  var meCards=G.me.hand.slice();
  floorCards.concat(meCards).forEach(function(c){ HIDE_IDS[c.id]=1; });
  window.DEAL_SHOWN=0;
  render();
  say('패를 나눠드리고 있어요…');

  // 배분 순서: 바닥4 → 상대5 → 나5 → 바닥4 → 상대5 → 나5
  var seq=[];
  floorCards.slice(0,4).forEach(function(c){ seq.push({t:'floor',c:c}); });
  for(var i=0;i<5;i++) seq.push({t:'opp'});
  meCards.slice(0,5).forEach(function(c){ seq.push({t:'me',c:c}); });
  floorCards.slice(4,8).forEach(function(c){ seq.push({t:'floor',c:c}); });
  for(var i2=0;i2<5;i2++) seq.push({t:'opp'});
  meCards.slice(5,10).forEach(function(c){ seq.push({t:'me',c:c}); });

  var GAP=112; // 배분 속도 (기존 75ms의 1.5배 느리게)
  seq.forEach(function(s,i){
    setTimeout(function(){
      sfx('tick');
      var from=deckRect();
      if(s.t==='opp'){
        var bk=document.getElementById('oppBacks');
        var to=rectOf(bk.lastElementChild||bk); to.w=18; to.h=28;
        flyClone(null, from, to, 270, function(){ window.DEAL_SHOWN++; render(); }, true);
      } else {
        var sel=(s.t==='me')?'#hand .card[data-id="'+s.c.id+'"]':'#floor .card[data-id="'+s.c.id+'"]';
        var el=document.querySelector(sel);
        var to=el?rectOf(el):deckRect();
        flyClone(null, from, to, 270, function(){ unhide(s.c.id); }, true);
      }
    }, i*GAP);
  });

  // 배분 종료 → 게임 시작
  setTimeout(function(){
    window.DEAL_SHOWN=null;
    floorCards.concat(meCards).forEach(function(c){ unhide(c.id); }); // 안전장치
    render();
    G.busy=false;
    say('패를 골라주세요');
    checkShakeOrBomb('me');
  }, seq.length*GAP+320);
}
function floorAdd(c){
  var g=G.floor.find(function(f){return f.month===c.month;});
  if(g) g.cards.push(c); else G.floor.push({month:c.month,cards:[c]});
}
function floorTake(month){
  var i=G.floor.findIndex(function(f){return f.month===month;});
  if(i<0) return [];
  var cards=G.floor[i].cards; G.floor.splice(i,1); return cards;
}

/* ── 점수 계산 ── */
function calcScore(p){
  var kw=p.cap.filter(function(c){return c.type==='KWANG';});
  var yl=p.cap.filter(function(c){return c.type==='YEOL';});
  var tt=p.cap.filter(function(c){return c.type==='TTI';});
  var piCnt=p.cap.reduce(function(n,c){return n+(c.type==='PI'?1:c.type==='SSANGPI'?2:0);},0);
  var s=0, parts=[];
  // 광
  if(kw.length===5){ s+=15; parts.push(['오광',15]); }
  else if(kw.length===4){ s+=4; parts.push(['사광',4]); }
  else if(kw.length===3){
    var hasBi=kw.some(function(c){return c.tag==='bi';});
    var v=hasBi?2:3; s+=v; parts.push([hasBi?'비삼광':'삼광',v]);
  }
  // 열끗 + 고도리
  if(yl.length>=5){ var v=yl.length-4; s+=v; parts.push(['열끗 '+yl.length+'장',v]); }
  if(yl.filter(function(c){return c.tag==='godori';}).length===3){ s+=5; parts.push(['고도리',5]); }
  // 띠 + 단
  if(tt.length>=5){ var v=tt.length-4; s+=v; parts.push(['띠 '+tt.length+'장',v]); }
  ['hong','chung','cho'].forEach(function(tag){
    if(tt.filter(function(c){return c.tag===tag;}).length===3){
      s+=3; parts.push([tag==='hong'?'홍단':tag==='chung'?'청단':'초단',3]);
    }
  });
  // 피
  if(piCnt>=10){ var v=piCnt-9; s+=v; parts.push(['피 '+piCnt+'장',v]); }
  return { score:s, parts:parts, kw:kw.length, yl:yl.length, tt:tt.length, pi:piCnt };
}

/* ── 렌더 ── */
function render(){
  // 바닥
  var fl=document.getElementById('floor'); fl.innerHTML='';
  G.floor.forEach(function(g){
    var slot=document.createElement('div');
    slot.className='fslot'+(g.cards.length>=3?' stack3':'');
    g.cards.forEach(function(c){ slot.appendChild(cardEl(c)); });
    slot.dataset.month=g.month;
    fl.appendChild(slot);
  });
  document.getElementById('deckN').textContent=G.deck.length;
  // 상대
  var ai=calcScore(G.ai);
  document.getElementById('oppScore').textContent=finalPreview(G.ai,ai.score)+'점';
  document.getElementById('oppCaps').innerHTML=capBadges(G.ai);
  document.getElementById('oppHandN').textContent=G.ai.hand.length;
  var bk=document.getElementById('oppBacks'); bk.innerHTML='';
  var backN=(window.DEAL_SHOWN!=null)?window.DEAL_SHOWN:G.ai.hand.length; // 배분 중엔 나눠준 만큼만
  for(var bi=0;bi<backN;bi++){ var b=document.createElement('span'); b.className='b'; bk.appendChild(b); }
  renderStrip('oppStrip',G.ai.cap);
  // 나
  var me=calcScore(G.me);
  document.getElementById('myScore').textContent=finalPreview(G.me,me.score)+'점';
  document.getElementById('myCaps').innerHTML=capBadges(G.me);
  renderStrip('myStrip',G.me.cap);
  // 손패
  var hd=document.getElementById('hand'); hd.innerHTML='';
  var floorMonths={}; G.floor.forEach(function(g){floorMonths[g.month]=1;});
  G.me.hand.forEach(function(c){
    var el=cardEl(c,'hand'+(floorMonths[c.month]?' matchable':''));
    el.onclick=function(){ if(G.turn==='me'&&!G.busy&&!G.over) playCard('me',c); };
    hd.appendChild(el);
  });
}
// 고/흔들기 배지만 표시 (광·열끗·띠·피 개수는 아래 획득 패 그룹에 이미 나와있어 중복이라 생략)
function capBadges(p){
  var out=[];
  if(p.go) out.push('<b style="color:#A03A3A">'+p.go+'고</b>');
  if(p.shake) out.push('<span style="color:var(--sage-deep);font-weight:800">흔듦×'+Math.pow(2,p.shake)+'</span>');
  return out.join(' · ');
}
function renderStrip(id,cap){
  var el=document.getElementById(id); el.innerHTML='';
  // 실제 화투처럼 광 / 열끗 / 띠 / 피 그룹으로 모아서 정렬
  var groups=[['광',['KWANG']],['열끗',['YEOL']],['띠',['TTI']],['피',['SSANGPI','PI']]];
  groups.forEach(function(g){
    var cards=cap.filter(function(c){return g[1].indexOf(c.type)>=0;});
    if(!cards.length) return;
    var box=document.createElement('div'); box.className='cap-group';
    var lbl=document.createElement('span'); lbl.className='cap-lbl';
    var n=(g[0]==='피')?cards.reduce(function(s,c){return s+(c.type==='SSANGPI'?2:1);},0):cards.length;
    lbl.textContent=g[0]+' '+n;
    box.appendChild(lbl);
    cards.sort(function(a,b){return a.month-b.month;}).forEach(function(c){ box.appendChild(cardEl(c)); });
    el.appendChild(box);
  });
}

function toneApply(text){
  text=fillHonor(text);   // ★{호칭} 치환은 말투와 무관하게 항상 (std 조기반환보다 먼저)

  var t=text;
  TONE_RULES[BOM_TONE].forEach(function(r){ t=t.replace(r[0], r[1]); });
  if(BOM_TONE==='ae' && Math.random()<0.5 && !/[♡~]/.test(t.slice(-1))) t=t.replace(/([!.])?$/,'♡');
  return t;
}

    bubble.textContent=greet;
    document.getElementById('bomFaceImg').src='/img/bom_wink.png';
    bubble.classList.add('show');
    if(_bomHideTimer) clearTimeout(_bomHideTimer);
    _bomHideTimer=setTimeout(function(){ bubble.classList.remove('show'); document.getElementById('bomFaceImg').src='/img/bom_smile.png'; }, 2600);
  }
}
function openTonePicker(){

var _bomHideTimer=null, _bomLastAt=0, _bomLastPriority=0;
// who='ai'(봄이가 함) → self 대사, who='me'(할배가 함) → user 대사. 생략 시 현재 턴 액터.
function bomSay(cat, who, force){
  var set=BOM_LINES[cat]; if(!set) return;
  var persp=(who||_actor)==='ai'?0:1;
  var lines=persp===0?set.self:(set.user&&set.user.length?set.user:null);
  if(!lines) return;                                   // user 대사가 없으면 침묵
  lines=lines.filter(function(x){return x;});          // 빈 문자열 제거
  if(!lines.length) return;
  var bubble=document.getElementById('bomBubble'); if(!bubble) return;
  var pr=BOM_PRIORITY[cat]||1, now=Date.now();
  if(!force && bubble.classList.contains('show') && pr<=_bomLastPriority && (now-_bomLastAt)<1500) return;
  _bomLastAt=now; _bomLastPriority=pr;
  bubble.textContent=toneApply(lines[Math.floor(Math.random()*lines.length)]);
  var img=document.getElementById('bomFaceImg');
  var face=BOM_FACE[cat]?BOM_FACE[cat][persp]:null;
  if(img && face) img.src='/img/'+face+'.png';
  bubble.classList.add('show');
  if(_bomHideTimer) clearTimeout(_bomHideTimer);
  var hold = pr>=2 ? 2200 : 1600;
  _bomHideTimer=setTimeout(function(){
    bubble.classList.remove('show');
    if(img) img.src='/img/bom_smile.png';
    _bomLastPriority=0;
  }, hold);
}

function checkShakeOrBomb(who){
  if(who!=='me') return;
  var byM={};
  G.me.hand.forEach(function(c){ if(!byM[c.month]) byM[c.month]=[]; byM[c.month].push(c); });
  for(var m in byM){
    if(byM[m].length>=3 && !G.me['asked'+m]){
      G.me['asked'+m]=1;
      var mm=m;
      // 실제로 들고 있는 그 달의 패 3장 이미지를 그대로 보여줌
      var cardsHtml=byM[m].slice(0,3).map(function(c){
        return '<div class="card" style="'+cardStyle(c)+';width:58px;height:90px;display:inline-block;vertical-align:middle;margin:0 3px"></div>';
      }).join('');
      modal('흔들기',
        mm+'월 패를 3장 들고 계세요!<div style="margin:12px 0;text-align:center">'+cardsHtml+'</div>흔들면 이번 판 점수가 <b>2배</b>가 됩니다.<br>(대신 상대에게 패가 알려져요)',
        [{label:'흔들기! (점수 2배)',fn:function(){ G.me.shake++; banner('흔들기!'); render(); }},
         {label:'그냥 하기',sub:true}]);
      return;
    }
  }
}

/* ── 턴 진행 ──
   1) 손패 제출 → 바닥 매칭
   2) 더미 뒤집기 → 매칭
   3) 특수(뻑/쪽/따닥/싹쓸이) 처리 → 획득
   4) 점수 확인 → 고/스톱 */
/* 같은 달 그룹에서 특정 카드들만 빼오기(나머지는 바닥에 남음) */
function takeFromGroup(month, ids){
  var g=G.floor.find(function(f){return f.month===month;});
  if(!g) return [];
  var taken=[];
  g.cards=g.cards.filter(function(c){ if(ids.indexOf(c.id)>=0){ taken.push(c); return false; } return true; });
  if(!g.cards.length) G.floor.splice(G.floor.indexOf(g),1);
  return taken;
}

/* 같은 달 패 2장 중 어느 것을 가져올지 선택 (나=화면 선택, 봄이=가치 높은 쪽 자동) */
function chooseCard(who, cards, cb){
  if(who!=='me'){
    cb(cards.slice().sort(function(a,b){return cardValue(b)-cardValue(a);})[0]);
    return;
  }
  sfx('click');
  var box=document.getElementById('chCards'); box.innerHTML='';
  cards.forEach(function(c){
    var el=cardEl(c);
    el.style.cssText+=';width:96px;height:150px;cursor:pointer;visibility:visible';
    el.onclick=function(){
      document.getElementById('chOverlay').classList.remove('on');
      sfx('pick'); cb(c);
    };
    box.appendChild(el);
  });
  document.getElementById('chOverlay').classList.add('on');
}

/* 착지 내리치기: 카드 펀치 + 판 흔들림 + 딱! */
function slamAt(id){
  var el=document.querySelector('#floor .card[data-id="'+id+'"]');
  if(el){ el.classList.add('slam'); setTimeout(function(){ el.classList.remove('slam'); },240); }
  var bd=document.querySelector('.board');
  if(bd){ bd.classList.add('bshake'); setTimeout(function(){ bd.classList.remove('bshake'); },220); }
  sfx('slap');
}

function playCard(who, card){
  G.busy=true;
  var p=G[who==='me'?'me':'ai'];
  sfx('pick');
  _bomSaidThisTurn=false;
  _actor=who;

  var startRect=handRect(who, card.id);     // 애니 출발점(손패/봄이 패)
  var preRects=floorRects();                 // 획득 애니용: 바닥 카드들의 현재 위치
  var animFrom={};                           // 카드id → 출발 rect
  animFrom[card.id]=startRect;

  p.hand.splice(p.hand.indexOf(card),1);

  var capture=[];   // 이번 턴 획득 예정
  var steals=0;     // 상대 피 뺏기 횟수
  var playedGroup=G.floor.find(function(f){return f.month===card.month;});
  var playedMatched=false, playedLaidId=null, chosenPlayId=null, isPpuk=false;

  // 배치 이후 진행(1단계 비행 → 뒤집기)
  function proceed(){
    var cardOnFloor=(playedMatched==='pending1'||playedMatched==='pending2'||playedLaidId);
    if(cardOnFloor) HIDE_IDS[card.id]=1;
    render();

    var afterPlay=function(){
      if(cardOnFloor){ unhide(card.id); slamAt(card.id); }

      setTimeout(function(){
        // ── 더미 뒤집기: 판 중앙 공개(1.2초) 후 매칭 진행 ──
        var flip=G.deck.pop();
        if(!flip){ finishTurn(who,capture,steals,animFrom); return; }
        var dR=deckRect();
        toast((who==='me'?'':'봄이 · ')+'더미에서 '+flip.month+'월 패가 나왔어요');

        revealFlip(flip, dR, function(centerRect, revealEl){
          var fid=flip.id;
          animFrom[fid]=centerRect;
          var preRects2=floorRects();
          var flipGroup=G.floor.find(function(f){return f.month===flip.month;});
          var flipOnFloor=false;

          // 매칭된 짝 위에 내리치는 연출: 정중앙이 아니라 실제 화투처럼 살짝 사선 아래로 겹쳐 내려찍음
          function slamThen(targetRect){
            if(!revealEl||!targetRect){ if(revealEl){revealEl.remove();revealEl=null;} finishFlip(); return; }
            var tgt={x:targetRect.x+10, y:targetRect.y+16, w:targetRect.w, h:targetRect.h};
            revealEl.style.transition='transform .32s cubic-bezier(.35,.75,.35,1), width .32s ease, height .32s ease';
            revealEl.style.transform='translate('+tgt.x+'px,'+tgt.y+'px)';
            revealEl.style.width=tgt.w+'px'; revealEl.style.height=tgt.h+'px';
            setTimeout(function(){
              sfx('slap');
              var bd=document.querySelector('.board');
              if(bd){ bd.classList.add('bshake'); setTimeout(function(){bd.classList.remove('bshake');},200); }
              animFrom[fid]=tgt;  // 획득 비행은 짝 위치(사선 아래)에서 출발
              setTimeout(function(){ if(revealEl){revealEl.remove();revealEl=null;} finishFlip(); }, 260);
            }, 320);
          }

          // 뒤집기 매칭 결과 확정 후 마무리(비행/정산)
          function finishFlip(){
            if(capture.length && G.floor.length===0 && G.deck.length>0){
              banner('싹쓸이!'); steals++;
            }
            if(flip && flipOnFloor) HIDE_IDS[flip.id]=1;
            render();
            if(flip && flipOnFloor){
              // 공개된 카드가 중앙에서 실제 바닥 자리로 끊김 없이 이어서 이동
              var fDest=document.querySelector('#floor .card[data-id="'+flip.id+'"]');
              var tr=fDest?rectOf(fDest):null;
              if(tr && revealEl){
                revealEl.style.transition='transform .32s cubic-bezier(.35,.75,.35,1), width .32s ease, height .32s ease';
                revealEl.style.transform='translate('+tr.x+'px,'+tr.y+'px)';
                revealEl.style.width=tr.w+'px'; revealEl.style.height=tr.h+'px';
                setTimeout(function(){
                  revealEl.remove();
                  unhide(flip.id); slamAt(flip.id);
                  finishTurn(who,capture,steals,animFrom);
                }, 360);
              } else {
                if(revealEl) revealEl.remove();
                flyClone(flip, centerRect, tr, 320, function(){
                  unhide(flip.id); slamAt(flip.id);
                  finishTurn(who,capture,steals,animFrom);
                });
              }
            } else {
              // 획득되는 패: 정산 비행이 중앙 위치에서 시작하므로 공개 카드는 여기서 제거
              if(revealEl) revealEl.remove();
              finishTurn(who,capture,steals,animFrom);
            }
          }

          if(playedMatched==='pending1' && flip.month===card.month){
            // 뻑! 내 패+바닥패+뒤집은 패 3장이 같은 달 → 못 먹고 쌓임
            flipGroup.cards.push(flip);
            banner('뻑!');
            playedMatched=false; flipOnFloor=true;
            finishFlip();
          }
          else if(playedMatched==='pending2' && flip.month===card.month){
            // 따닥! 4장 모두 획득 + 피 뺏기
            var gd=G.floor.find(function(f){return f.month===card.month;});
            var tgtDd=preRects2[gd.cards[0].id];
            gd.cards.forEach(function(c){ if(!animFrom[c.id]) animFrom[c.id]=preRects2[c.id]||preRects[c.id]; });
            capture=capture.concat(floorTake(card.month)); capture.push(flip);
            banner('따닥!'); steals++;
            playedMatched=true; flip=null;
            slamThen(tgtDd);
          }
          else {
            // 낸 패 확정 처리
            if(playedMatched==='pending1'){
              var gp=G.floor.find(function(f){return f.month===card.month;});
              gp.cards.forEach(function(c){ if(!animFrom[c.id]) animFrom[c.id]=preRects2[c.id]||preRects[c.id]; });
              capture=capture.concat(floorTake(card.month));
              playedMatched=true;
              if(isPpuk){ steals++; banner('뻑 먹기!'); }
            } else if(playedMatched==='pending2'){
              // 2장 중 골라둔 패 + 내 패만 가져오고 나머지 1장은 바닥에 남김(정식 룰)
              var gp2=G.floor.find(function(f){return f.month===card.month;});
              gp2.cards.forEach(function(c){ if(!animFrom[c.id]) animFrom[c.id]=preRects2[c.id]||preRects[c.id]; });
              capture=capture.concat(takeFromGroup(card.month,[card.id,chosenPlayId]));
              playedMatched=true;
            }
            // 뒤집은 패 매칭
            if(flip){
              if(playedLaidId && flip.month===card.month){
                // 쪽! 낸 패가 매칭 안 됐는데 뒤집은 패가 그 패와 맞음
                var gj=G.floor.find(function(f){return f.month===card.month;});
                var tgtJk=preRects2[card.id];
                gj.cards.forEach(function(c){ animFrom[c.id]=preRects2[c.id]||animFrom[c.id]; });
                capture=capture.concat(floorTake(card.month)); capture.push(flip);
                banner('쪽!'); steals++;
                slamThen(tgtJk);
              }
              else if(flipGroup && flipGroup.month!==card.month){
                var tgtFg=preRects2[flipGroup.cards[0].id];
                flipGroup.cards.forEach(function(c){ animFrom[c.id]=preRects2[c.id]; });
                if(flipGroup.cards.length===3){
                  capture=capture.concat(floorTake(flip.month)); capture.push(flip); steals++;
                  slamThen(tgtFg);
                } else if(flipGroup.cards.length===2){
                  // 뒤집은 패도 같은 달 2장과 만남 → 어느 것을 가져올지 선택
                  chooseCard(who, flipGroup.cards.slice(), function(chosen){
                    var tgtCh=preRects2[chosen.id];
                    capture=capture.concat(takeFromGroup(flip.month,[chosen.id])); capture.push(flip);
                    slamThen(tgtCh);
                  });
                } else {
                  capture=capture.concat(floorTake(flip.month)); capture.push(flip);
                  slamThen(tgtFg);
                }
              }
              else if(!flipGroup){
                floorAdd(flip); flipOnFloor=true; finishFlip();
              }
              else { // 같은 달인데 위 분기 안 탄 경우(이미 먹은 달)
                floorAdd(flip); flipOnFloor=true; finishFlip();
              }
            } else {
              finishFlip();
            }
          }
        }); // revealFlip 끝
      }, 260);
    };

    var cardOnFloorNow=(playedMatched==='pending1'||playedMatched==='pending2'||playedLaidId);
    if(cardOnFloorNow){
      var pDest=document.querySelector('#floor .card[data-id="'+card.id+'"]');
      flyClone(card, startRect, pDest?rectOf(pDest):null, 320, afterPlay);
    } else {
      afterPlay();
    }
  }

  // ── 배치 판정 ──
  if(playedGroup){
    if(playedGroup.cards.length===3){
      // 바닥 3장(뻑 더미) + 내 1장 = 4장 싹 먹기
      // 손패가 먼저 바닥 더미 위로 실제로 내려앉는 걸 보여준 뒤에 획득 처리(뻑 전용 플래그)
      isPpuk=true;
      playedGroup.cards.push(card); playedMatched='pending1';
      proceed();
    } else if(playedGroup.cards.length===2){
      // 같은 달 2장: 어느 것을 가져올지 먼저 선택 (따닥이 나면 어차피 다 가져감)
      chooseCard(who, playedGroup.cards.slice(), function(chosen){
        chosenPlayId=chosen.id;
        playedGroup.cards.push(card); playedMatched='pending2';
        proceed();
      });
    } else {
      playedGroup.cards.push(card); playedMatched='pending1';
      proceed();
    }
  } else {
    floorAdd(card); playedLaidId=card.id;
    proceed();
  }
}

function finishTurn(who,capture,steals,animFrom){
  var p=G[who], opp=G[who==='me'?'ai':'me'];
  var stolen=[];
  // 뺏기기 전 상대 획득칸의 카드별 위치 스냅샷 (뺏은 피 출발점)
  var preStrip={};
  document.querySelectorAll('.cap-strip .card').forEach(function(el){ preStrip[el.dataset.id]=rectOf(el); });

  capture.forEach(function(c){ p.cap.push(c); });
  // 피 뺏기
  for(var i=0;i<steals;i++){
    var idx=opp.cap.findIndex(function(c){return c.type==='PI';});
    if(idx<0) idx=opp.cap.findIndex(function(c){return c.type==='SSANGPI';});
    if(idx>=0){ var scard=opp.cap.splice(idx,1)[0]; p.cap.push(scard); stolen.push(scard); toast(who==='me'?'봄이의 피를 한 장 가져왔어요!':'봄이가 내 피를 가져갔어요'); }
  }

  // 이동 중에는 획득칸의 새 카드들을 숨겨두고, 도착하는 순서대로 나타나게
  capture.forEach(function(c){ HIDE_IDS[c.id]=1; });
  stolen.forEach(function(c){ HIDE_IDS[c.id]=1; });
  render();

  // 3단계: 획득한 패들이 각자 자기 그룹(광/열끗/띠/피) 자리로 개별 비행
  var stripSel = who==='me' ? '#myStrip' : '#oppStrip';
  function destOf(c){
    var el=document.querySelector(stripSel+' .card[data-id="'+c.id+'"]');
    return el?rectOf(el):stripRect(who);
  }
  capture.forEach(function(c,i){
    var from=animFrom&&animFrom[c.id];
    if(!from){ unhide(c.id); return; }
    setTimeout(function(){
      flyClone(c, from, destOf(c), 320, function(){ unhide(c.id); });
      sfx('collect');
    }, i*80);
  });
  if(stolen.length) sfx('steal',200);
  // 뻑/따닥/쪽/싹쓸이/흔들기/고 처럼 이미 말풍선이 뜬 경우가 아니면 상황별 기본 반응
  if(!_bomSaidThisTurn){
    if(stolen.length>0) bomSay('steal',who);
    else if(capture.length===0) bomSay('play',who);
    else if(capture.length===1 && capture[0].type==='PI') bomSay('cheap',who);
    else if(capture.length>0) bomSay('capture',who);
  }
  stolen.forEach(function(c,i){
    var from=preStrip[c.id]||rectOf(document.getElementById(who==='me'?'oppStrip':'myStrip'));
    setTimeout(function(){
      flyClone(c, from, destOf(c), 320, function(){ unhide(c.id); });
    }, 200+i*80);
  });
  // 안전장치: 어떤 이유로든 비행이 누락돼도 전부 표시되도록
  var totalN=capture.length+stolen.length;
  setTimeout(function(){ capture.concat(stolen).forEach(function(c){ unhide(c.id); }); }, totalN*80+700);

  // 획득 애니메이션이 끝난 뒤에 고/스톱·다음 턴 진행
  var animWait = totalN ? Math.min(totalN*80+520, 1300) : 60;
  setTimeout(function(){
    var sc=calcScore(p).score;
    // 고/스톱 판정: 7점 이상 + 직전 고 시점보다 점수 상승
    if(!G.over && sc>=7 && sc>p.lastGoScore){
      // 낼 패가 없으면 '고'가 불가능 → 물어보지 않고 그대로 승리 종료
      if(p.hand.length===0){ endGame(who); return; }
      if(who==='me'){
        G.busy=false;
        modal('고? 스톱?',
          '현재 <b>'+sc+'점</b>이에요!<span class="big">🤔</span>'+
          '<b>고</b>를 하면 점수를 더 쌓을 수 있지만,<br>봄이가 역전하면 <b>고박</b>으로 배로 물어줘요.<br>'+
          '<b>스톱</b>하면 지금 점수로 이깁니다.',
          [{label:'스톱! (지금 이기기)',fn:function(){ endGame('me'); }},
           {label:'고! (더 노려보기)',fn:function(){ p.go++; p.lastGoScore=sc; banner(p.go+'고!'); nextTurn(who); }}]);
        return;
      } else {
        // AI 고/스톱: 단순 정책 — 첫 점수면 60% 고, 2고부터는 스톱
        if(p.go<1 && Math.random()<0.6 && G.deck.length>6){
          p.go++; p.lastGoScore=sc; banner('봄이 '+p.go+'고!');
        } else {
          bomSay('stop','ai'); endGame('ai'); return;
        }
      }
    }
    // 나가리
    if(G.me.hand.length===0 && G.ai.hand.length===0){ endGame(null); return; }
    nextTurn(who);
  }, animWait);
}

function nextTurn(who){
  G.turn = (who==='me')?'ai':'me';
  G.busy=false;
  render();
  if(G.turn==='ai'){
    say('봄이가 생각하고 있어요…');
    setTimeout(aiPlay, 900);
  } else {
    say('패를 골라주세요');
  }
}

/* ── AI: 그리디 ── */
function cardValue(c){
  if(c.type==='KWANG') return 10;
  if(c.type==='SSANGPI') return 6;
  if(c.type==='YEOL') return c.tag==='godori'?8:5;
  if(c.type==='TTI') return c.tag?6:4;
  return 1;
}
function aiPlay(){
  if(G.over) return;
  var hand=G.ai.hand;
  if(!hand.length){ finishTurn('ai',[],0); return; }
  var floorMonths={}; G.floor.forEach(function(f){floorMonths[f.month]=f.cards;});
  // 먹을 수 있는 패 중 가치 최고
  var best=null,bestV=-1;
  hand.forEach(function(c){
    var g=floorMonths[c.month];
    if(g){
      var v=cardValue(c)+g.reduce(function(n,x){return n+cardValue(x);},0);
      if(v>bestV){bestV=v;best=c;}
    }
  });
  if(!best){
    // 못 먹으면 가장 가치 낮은 패 버림
    best=hand.slice().sort(function(a,b){return cardValue(a)-cardValue(b);})[0];
  }
  playCard('ai',best);
}

/* ── 종료 & 정산 ── */
function endGame(winner){
  G.over=true; G.busy=true;
  sfx(winner==='me'?'win':winner==='ai'?'lose':'draw');
  bomSay(winner==='ai'?'win':winner==='me'?'lose':'draw','ai'); // 게임 결과는 봄이 관점 고정
  if(winner===null){
    STATS.draws++; STATS.points+=1; saveStats(); // 참가 포인트
    modal('나가리', '둘 다 점수를 내지 못했어요.<span class="big">😅</span>무승부입니다!<br><span style="font-size:13px;color:var(--muted)">참가 포인트 +1P</span>',
      [{label:'다시 하기',fn:tryNewGame},{label:'나가기',sub:true,fn:function(){location.href='/';}}]);
    return;
  }
  var w=G[winner], l=G[winner==='me'?'ai':'me'];
  var ws=calcScore(w), ls=calcScore(l);
  var total=ws.score;
  var rows=ws.parts.map(function(p){return '<tr><td>'+p[0]+'</td><td>'+p[1]+'점</td></tr>';});
  // 고 보너스
  if(w.go===1){ total+=1; rows.push('<tr><td>1고</td><td>+1점</td></tr>'); }
  if(w.go===2){ total+=2; rows.push('<tr><td>2고</td><td>+2점</td></tr>'); }
  if(w.go>=3){ total+=2; rows.push('<tr><td>'+w.go+'고</td><td>+2점, ×'+Math.pow(2,w.go-2)+'</td></tr>'); total*=Math.pow(2,w.go-2); }
  // 피박: 진 쪽 피 5장 이하(승자가 피 점수 났을 때)
  if(ws.pi>=10 && ls.pi<=5 && ls.pi>0){ total*=2; rows.push('<tr><td>피박!</td><td>×2</td></tr>'); }
  // 광박: 승자 광 점수, 패자 광 0
  if(ws.kw>=3 && ls.kw===0){ total*=2; rows.push('<tr><td>광박!</td><td>×2</td></tr>'); }
  // 고박: 진 쪽이 고를 불렀는데 역전당함
  if(l.go>0){ total*=2; rows.push('<tr><td>고박!</td><td>×2</td></tr>'); }
  // 흔들기
  if(w.shake>0){ total*=Math.pow(2,w.shake); rows.push('<tr><td>흔들기</td><td>×'+Math.pow(2,w.shake)+'</td></tr>'); }

  var isMe=winner==='me';
  // 포인트·전적 정산: 승리=최종점수만큼, 패배=참가 1P
  var oldLv=levelOf(STATS.points).lv;
  var earned=isMe?total:1;
  STATS.points+=earned;
  if(isMe) STATS.wins++; else STATS.losses++;
  saveStats();
  var newL=levelOf(STATS.points);
  var lvUp=newL.lv>oldLv;
  var ptLine='<div style="margin:10px 0 4px;padding:10px;background:rgba(63,90,48,.08);border-radius:12px;font-size:14px;font-weight:800;color:var(--sage-deep)">'
    +'✨ +'+earned+'P 획득 · 누적 '+STATS.points+'P<br>'
    +'<span style="font-size:12.5px;font-weight:700">'+STATS.wins+'승 '+STATS.losses+'패'+(STATS.draws?' '+STATS.draws+'무':'')+' · Lv.'+newL.lv+' '+newL.name+'</span>'
    +(lvUp?'<br><span style="color:#B8860B">🎊 레벨 업! Lv.'+newL.lv+' '+newL.name+' 달성!</span>':'')
    +'</div>';
  modal(isMe?'🎉 이겼습니다!':'😢 봄이가 이겼어요',
    '<span class="big">'+(isMe?'👏':'🌸')+'</span>'+
    '<table class="mm-score-table">'+rows.join('')+
    '<tr><td><b>최종</b></td><td><b>'+total+'점</b></td></tr></table>'+
    ptLine+
    (isMe?'대단하세요! 한 판 더 어떠세요?':'봄이가 운이 좋았네요. 복수전 가시죠!'),
    [{label:'한 판 더!',fn:tryNewGame},{label:'나가기',sub:true,fn:function(){location.href='/';}}]);
}

document.getElementById('sndBtn').textContent=SND_ON?'🔊':'🔇';
document.getElementById('bgmBtn').textContent=BGM_ON?'🔇':'🎵';
renderStats();
loadPremium();   // statsFB 정의 이후에 호출(위 주석 참고)
tryNewGame();
</script>
