<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#F5F1E8; --paper:#FBF8F0; --ink:#1A2416; --muted:#5C6152;
  --sage:#4B6B3B; --sage-deep:#33492A; --gold:#C9A961; --line:#E0DAC9;
  --danger:#B23A2E;
}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--cream);color:var(--ink);font-weight:700;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(245,241,232,.97);border-bottom:2px solid var(--line);flex-shrink:0}
.h-who{display:flex;align-items:center;gap:12px}
.h-who .face{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#B7C9A6,#8FAE79);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:800}
.h-who .name{font-size:19px;font-weight:800;color:var(--sage-deep)}
.btn{min-height:52px;padding:0 20px;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:#fff;border:2px solid var(--line);color:var(--sage-deep)}

#chatArea{flex:1;overflow-y:auto;padding:24px 18px 12px;display:flex;flex-direction:column;gap:16px;max-width:760px;margin:0 auto;width:100%}
.bubble-row{display:flex;gap:10px;align-items:flex-end}
.bubble-row.senior{flex-direction:row-reverse}
.bavatar{width:38px;height:38px;border-radius:50%;background:var(--sage);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bubble-row.senior .bavatar{background:linear-gradient(135deg,#B7C9A6,#8FAE79)}
.bubble{max-width:72%;padding:16px 20px;border-radius:22px;font-size:19px;line-height:1.6;font-weight:700}
.bubble-row.bom .bubble{background:var(--paper);border:2px solid var(--line);border-bottom-left-radius:6px;color:var(--ink)}
.bubble-row.senior .bubble{background:var(--sage);color:#fff;border-bottom-right-radius:6px}
.thinking{display:flex;gap:5px;padding:8px 4px}
.thinking span{width:8px;height:8px;border-radius:50%;background:var(--muted);opacity:.4;animation:blink 1.2s infinite}
.thinking span:nth-child(2){animation-delay:.2s}
.thinking span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:.9}}

#inputBar{flex-shrink:0;padding:16px 18px 22px;background:rgba(245,241,232,.97);border-top:2px solid var(--line)}
.inrow{max-width:760px;margin:0 auto;display:flex;gap:10px;align-items:center}
#txtInput{flex:1;min-height:60px;padding:0 20px;border:2px solid var(--line);border-radius:30px;font-size:19px;font-family:inherit;background:#fff;color:var(--ink)}
#txtInput:focus{outline:none;border-color:var(--sage)}
.round-btn{width:60px;height:60px;border-radius:50%;border:none;flex-shrink:0;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#micBtn{background:#fff;border:2px solid var(--line);color:var(--sage-deep)}
#micBtn.listening{background:var(--danger);color:#fff;border-color:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(178,58,46,.5)}70%{box-shadow:0 0 0 14px rgba(178,58,46,0)}100%{box-shadow:0 0 0 0 rgba(178,58,46,0)}}
#sendBtn{background:var(--sage);color:#fff}
#sendBtn:disabled{opacity:.5}
.stt-hint{max-width:760px;margin:8px auto 0;font-size:13.5px;color:var(--muted);text-align:center}

.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);padding:16px 30px;font-size:17px;z-index:500;border-radius:50px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}

.mv{position:fixed;inset:0;background:rgba(26,36,22,.72);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mv.on{display:flex}
.mbox{background:var(--paper);border-radius:24px;width:100%;max-width:420px;padding:32px 28px;text-align:center}
.mbox h3{font-size:22px;font-weight:800;color:var(--sage-deep);margin-bottom:10px}
.mbox p{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:22px}
.mrow{display:flex;gap:12px}
.mrow .btn{flex:1}
</style>

<script>
var FB_CFG={apiKey:"AIzaSyAZAhBAsrKcXnznnx8_0oF2gyYC0WbvoP0",authDomain:"mylife-650f0.firebaseapp.com",projectId:"mylife-650f0",storageBucket:"mylife-650f0.firebasestorage.app",messagingSenderId:"512010655611",appId:"1:512010655611:web:32b153b836b23ae96a8fde"};
var MASTER=['machojang@gmail.com','machojang@naver.com'];
if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
var _auth=firebase.auth(), _db=firebase.firestore(), _fn=firebase.app().functions('asia-northeast3');
_auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

var SENIOR=null, SESSION_ID=null, CTX={uid:null,email:null,isMaster:false,orgId:null};
var ENDED=false, seniorTurns=0, transitionShown=false;
// 선물 연출 데모(?giftdemo=1) — 시연·품질 확인용, 로그인·저장 없음
var GIFT_DEMO = new URLSearchParams(location.search).get('giftdemo')==='1';

function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function toast(t){ var el=document.getElementById('toast'); el.textContent=t; el.style.opacity=1; setTimeout(function(){el.style.opacity=0;},2200); }
function initial(name){ return (name||'').trim().charAt(0)||'봄'; }

(function loadSenior(){
  if(GIFT_DEMO){
    SENIOR={id:'demo',name:'순자',gender:'여'};
    document.getElementById('seniorFace').textContent=initial(SENIOR.name);
    document.getElementById('seniorName').textContent='선물 연출 데모';
    setTimeout(function(){
      giftSequence({ memoirTitle:'', memoirBook:{ done:true, sections:{
        0:'된장찌개 냄새가 골목 끝까지 번지던 저녁이었다. 강원도 산골, 굴뚝마다 연기가 피어오르면 어머니는 나를 부르셨다.\n\n지금 돌이켜보면 그 좁은 부엌이 세상에서 가장 넓은 곳이었다.',
        3:'아버지는 말수가 적은 분이셨다. 그래도 밥상머리에서 슬며시 반찬을 내 쪽으로 밀어주시던 그 손길을 잊지 못한다.\n\n그 시절을 생각하면 가슴 한켠이 먹먹해지는 줄도 몰랐다.',
        13:'요즘은 손주들 웃음소리가 제일 좋다. 별것 아닌 하루가 이렇게 고마운 것인 줄, 살아보니 알겠다.'
      }}});
    }, 700);
  } else {
    try{
      var raw=sessionStorage.getItem('dasibom_active_senior');
      if(!raw){ location.href='/kiosk'; return; }
      SENIOR=JSON.parse(raw);
    }catch(e){ location.href='/kiosk'; return; }
    document.getElementById('seniorFace').textContent=initial(SENIOR.name);
    document.getElementById('seniorName').textContent=SENIOR.name+' '+(SENIOR.gender==='남'?'할아버지':'할머니');
  }
})();

_auth.onAuthStateChanged(function(u){
  if(GIFT_DEMO) return; // 데모는 로그인·세션 생성 없음
  if(!u || u.isAnonymous){ location.href='/kiosk'; return; }
  CTX.uid=u.uid; CTX.email=u.email||'';
  CTX.isMaster = MASTER.indexOf(CTX.email)>=0;
  if(CTX.isMaster){ startSession(); return; }
  _db.collection('admin_roles').doc(u.uid).get().then(function(doc){
    if(doc.exists && doc.data().status==='approved' && ['org_admin','caregiver'].indexOf(doc.data().role)>=0){
      CTX.orgId=doc.data().orgId||null;
      startSession();
    } else {
      location.href='/kiosk';
    }
  }).catch(function(){ location.href='/kiosk'; });
});

function startSession(){
  var centerId = CTX.isMaster ? (SENIOR.centerId||'demo-center') : CTX.orgId;
  _db.collection('care_sessions').add({
    centerId: centerId,
    seniorId: SENIOR.id, seniorName: SENIOR.name,
    staffUid: CTX.uid, staffEmail: CTX.email,
    startedAt: firebase.firestore.FieldValue.serverTimestamp(),
    status: 'active', turns: []
  }).then(function(ref){
    SESSION_ID=ref.id;
    memoirEntry();
  }).catch(function(e){ toast('세션 시작 실패: '+(e.code||e.message)); });
}

/* ════ 프로필 기반 자서전 — 답변·진행·완성본 전부 seniors/{id}에 저장(기기 무관) ════ */
var MEMOIR={ awaiting:false, idx:-1, data:null, generating:false };
var MEMOIR_ACKS=[
  '정말 소중한 이야기예요. 들려주셔서 고마워요 🌸',
  '와… 듣기만 해도 그 시절이 그려져요.',
  '마음이 따뜻해지는 이야기네요. 꼭 간직할게요.',
  '그런 일이 있으셨군요. 봄이가 잘 새겨둘게요 🌱'
];
function _mToday(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function _mNextTenAM(){ var d=new Date(); d.setDate(d.getDate()+1); d.setHours(10,0,0,0); return d.getTime(); }
function freeQList(){
  var pool=(window.QPOOL||[]);
  return pool.filter(function(q){ return q.tier==='free' && !q.reserve; });
}
// {호칭} → "성함님" 치환 + 조사 교정('님'은 받침 有)
function resolveQ(q){
  var h=SENIOR.name+'님';
  return String(q.bom||'')
    .replace(/\{호칭\}은/g,h+'은').replace(/\{호칭\}이/g,h+'이')
    .replace(/\{호칭\}을/g,h+'을').replace(/\{호칭\}/g,h);
}
function memoirEntry(){
  _db.collection('seniors').doc(SENIOR.id).get().then(function(doc){
    var S=doc.exists?doc.data():{};
    MEMOIR.data=S;
    var answers=S.memoirAnswers||{};
    var answered=Object.keys(answers).length;
    var sp=S.memoirSurprise;
    var bookDone=S.memoirBook && S.memoirBook.done;
    // ① 선물 도착: 익일 10시 지남 + 책 완성 + 미전달 → 봄이 선물 연출
    if(sp && !sp.delivered && bookDone && Date.now()>=sp.readyAt){ giftSequence(S); return; }
    // ② 15개 완료 상태
    if(answered>=15){
      if(!bookDone){ resumeGeneration(S); } // 생성 미완이면 조용히 이어서 (안내 없음 — 서프라이즈 보호)

function askNextMemoirQ(){

  addBubble('bom', qText); speak(qText); saveTurn('bom', qText);

function handleMemoirAnswer(msg){

// ── 책 생성(백그라운드) — 섹션별 진행 저장이라 끊겨도 다음 진입 시 이어서 ──
function resumeGeneration(S){
  if(MEMOIR.generating) return; MEMOIR.generating=true;
  var list=freeQList();
  var answers=S.memoirAnswers||{};
  var sections=(S.memoirBook&&S.memoirBook.sections)||{};
  var fn=_fn.httpsCallable('generateSection');
  var queue=[];
  for(var i=0;i<15;i++){ if(answers[i] && !sections[i]) queue.push(i); }
  function next(){
    if(!queue.length){
      _db.collection('seniors').doc(SENIOR.id).update({ 'memoirBook.done':true, 'memoirBook.generatedAt':Date.now() })
        .catch(function(e){ console.error(e); });
      MEMOIR.generating=false; return;
    }
    var i=queue.shift(); var q=list[i];
    fn({ question:resolveQ(q), answer:answers[i], chapterName:q.cat, paraCount:(String(answers[i]).length>80?2:1), pkg:'free' })
      .then(function(r){
        var upd={}; upd['memoirBook.sections.'+i]=(r.data&&r.data.text)||'';
        return _db.collection('seniors').doc(SENIOR.id).update(upd);
      })
      .then(function(){ setTimeout(next, 800); })
      .catch(function(e){ console.error('생성 실패 idx'+i, e); MEMOIR.generating=false; }); // 다음 진입 시 재개
  }
  next();
}

function sHonor(){ return SENIOR.name+' '+(SENIOR.gender==='남'?'할아버지':'할머니'); }

/* ── TTS (봄이 프리미엄 음성 — 정해진 대사에만. 자유대화 AI 응답엔 호출 안 함) ──
   서버(bomVoiceTTS)가 텍스트 캐시라 같은 문구는 최초 1회만 실제 합성됨.
   성함 포함 문구는 그때그때 합성되나, 오디오 파일을 기기에 저장하진 않음(재생 후 메모리에서만). */
/* ★봄이 음성 타이밍 표준(스킬 bom-voice-timing) — 곧 나올 대사는 prewarm()으로 '미리' 합성해둔다.
   안 그러면 대사 차례에 서버 왕복(1~2초)이 그제서야 시작돼 텍스트만 먼저 뜨고 음성이 한참 뒤에 나옴. */
var _ttsMem={}, _ttsPend={}, _ttsSeq=0;
// ★정규화는 dasibom-caregreet.js의 bomVoiceClean — carekiosk가 미리 합성할 때와 '같은 문자열'이어야 캐시 적중.
function ttsClean(text){ return window.bomVoiceClean ? bomVoiceClean(text) : String(text||'').replace(/[🌸✦→·🎉🌷💛🌱📖]/g,' ').replace(/\s+/g,' ').trim(); }
function ttsFetch(t){
  if(_ttsMem[t]) return Promise.resolve(_ttsMem[t]);
  if(_ttsPend[t]) return _ttsPend[t];                 // 프리워밍과 재생이 같은 문구를 두 번 합성하지 않도록
  var p;
  try{
    p=_fn.httpsCallable('bomVoiceTTS')({ text:t }).then(function(res){
      delete _ttsPend[t];
      var b64=res&&res.data&&res.data.audioBase64; if(!b64) return null;
      var url='data:audio/mpeg;base64,'+b64; _ttsMem[t]=url; return url;
    }).catch(function(){ delete _ttsPend[t]; return null; });   // 실패 시 무음
  }catch(e){ return Promise.resolve(null); }
  _ttsPend[t]=p; return p;
}
function prewarm(text){ var t=ttsClean(text); if(t) ttsFetch(t); }   // 미리 합성만(재생X)
function speak(text){
  var t=ttsClean(text); if(!t) return;
  try{ if('speechSynthesis' in window) speechSynthesis.cancel(); }catch(e){}
  try{ _bomAudio.pause(); }catch(e){}
  var my=++_ttsSeq;
  ttsFetch(t).then(function(url){
    if(!url || my!==_ttsSeq) return;                  // 다음 대사에 밀렸으면 재생 안 함(밀린 음성 방지)
    try{ _bomAudio.src=url; _bomAudio.currentTime=0; _bomAudio.play().catch(function(){}); }catch(e){}
  });
}
var _bomAudio=new Audio();
// 자동재생 잠금 해제 — 첫 터치 때 '실제 길이 있는' 무음 재생으로 오디오 요소를 깨워둠(서버 왕복 후 재생 허용)
(function(){
  function silentWav(){ var sr=8000,n=1200,dl=n*2,len=44+dl,b=new Uint8Array(len),dv=new DataView(b.buffer);
    function s(o,str){for(var i=0;i<str.length;i++)b[o+i]=str.charCodeAt(i);}
    s(0,'RIFF');dv.setUint32(4,36+dl,true);s(8,'WAVE');s(12,'fmt ');dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,1,true);
    dv.setUint32(24,sr,true);dv.setUint32(28,sr*2,true);dv.setUint16(32,2,true);dv.setUint16(34,16,true);s(36,'data');dv.setUint32(40,dl,true);
    var bin='';for(var i=0;i<len;i++)bin+=String.fromCharCode(b[i]);return 'data:audio/wav;base64,'+btoa(bin); }
  var done=false;
  function unlock(){ if(done) return; done=true;
    try{ _bomAudio.src=silentWav(); var p=_bomAudio.play(); if(p&&p.then) p.then(function(){},function(){}); }catch(e){}
    ['pointerdown','touchstart','click','keydown'].forEach(function(ev){ document.removeEventListener(ev,unlock,true); });
  }
  ['pointerdown','touchstart','click','keydown'].forEach(function(ev){ document.addEventListener(ev,unlock,true); });
})();

}
function goBrowse(){
  var btn=document.getElementById('goBrowseBtn'); if(btn){ btn.disabled=true; btn.textContent='정리하는 중…'; }
  finishSession().then(function(){
    try{
      sessionStorage.removeItem('dasibom_active_senior');
      sessionStorage.setItem('dasibom_kiosk_browse','1');
      sessionStorage.removeItem('dasibom_kiosk_banner_shown');
    }catch(e){}
    location.href='/';
  });
}
document.getElementById('sendBtn').onclick=sendMessage;
document.getElementById('txtInput').addEventListener('keydown', function(e){ if(e.key==='Enter') sendMessage(); });

/* ── STT (지원 브라우저에서만; 실기기 검증 전 보조 수단으로만 제공) ── */
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var recog=null, listening=false;
if(SR){
  recog=new SR();
  recog.lang='ko-KR'; recog.continuous=false; recog.interimResults=false;
  recog.onresult=function(e){
    var t=e.results[0][0].transcript;
    document.getElementById('txtInput').value=t;
    sendMessage();
  };
  recog.onerror=function(){ listening=false; document.getElementById('micBtn').classList.remove('listening'); };
  recog.onend=function(){ listening=false; document.getElementById('micBtn').classList.remove('listening'); };
  document.getElementById('micBtn').onclick=function(){
    if(listening){ recog.stop(); return; }
    try{ recog.start(); listening=true; document.getElementById('micBtn').classList.add('listening'); }
    catch(e){}
  };
} else {
  document.getElementById('micBtn').style.display='none';
  document.getElementById('sttHint').textContent='이 기기는 음성 인식을 지원하지 않아요. 화면을 눌러 글자로 말씀해 주세요.';
}

/* ── 세션 마감 공통 로직 — status:ended + 발화 추출. 성공/실패 상관없이 resolve(다음 화면 전환은 호출부가 결정) ── */
function finishSession(){
  if(!SESSION_ID) return Promise.resolve();
  ENDED=true;
  return _db.collection('care_sessions').doc(SESSION_ID).update({
    status:'ended', endedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    return _fn.httpsCallable('extractCareInsights')({ sessionId: SESSION_ID });
  }).catch(function(e){
    console.error('세션 마감 오류', e);
  });
}

/* ── 대화 종료(스태프용 — 다음 어르신을 위해 키오스크 프로필 화면으로 복귀) ── */
document.getElementById('btnEnd').onclick=function(){ document.getElementById('endModal').classList.add('on'); };
document.getElementById('endConfirm').onclick=function(){
  var btn=this; btn.disabled=true; btn.textContent='정리하는 중…';
  finishSession().then(function(){
    try{ sessionStorage.removeItem('dasibom_active_senior'); }catch(e){}
    toast('오늘 대화를 기록했어요');
    setTimeout(function(){ location.href='/kiosk'; }, 900);
  });
};
</script>
