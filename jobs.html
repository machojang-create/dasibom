<style>
:root{--ts:1}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#FFFBF4;color:#3A2E22;min-height:100vh}
.wrap{max-width:600px;margin:0 auto;padding:0 18px 80px}
button{font-family:inherit}

/* 헤더: 왼쪽 홈으로 / 오른쪽 제목 (카드 UI 표준) */
header{position:sticky;top:0;z-index:100;background:rgba(255,251,244,.96);backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,120,74,.14);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.back{border:1.5px solid rgba(200,120,74,.3);color:#c8784a;background:none;font-size:calc(15px * var(--ts));font-weight:700;padding:10px 18px;border-radius:50px;cursor:pointer;text-decoration:none}
.htitle{font-size:calc(17px * var(--ts));font-weight:800;color:#3A2A18}

/* 히어로 */
.hero{padding:34px 0 6px;text-align:center}
.hero h1{font-family:'Nanum Myeongjo','Batang',serif;font-size:clamp(26px,6.5vw,32px);font-weight:800;color:#3A2A18;line-height:1.45}
.hero h1 em{font-style:normal;color:#c8784a}
.hero p{margin-top:12px;font-size:calc(16px * var(--ts));color:#6b5a48;line-height:1.8}

/* 탭 */
.tabs{display:flex;gap:9px;margin:26px 0 20px}
.tab{flex:1;padding:15px 6px;border-radius:16px;border:1.5px solid #EBD9C2;background:#fff;color:#7a6650;font-size:calc(15.5px * var(--ts));font-weight:800;cursor:pointer;line-height:1.35;min-height:60px}
.tab.on{background:linear-gradient(135deg,#c8784a,#d4845a);border-color:transparent;color:#fff;box-shadow:0 8px 18px -6px rgba(200,120,74,.5)}
.sec{display:none}
.sec.on{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── 1. 일자리 찾기: 대화형 입력 ── */
.chatcard{background:#fff;border:1.5px solid rgba(200,120,74,.16);border-radius:22px;padding:22px 20px;box-shadow:0 4px 18px rgba(120,80,40,.07)}
.bubble{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
.bom{width:44px;height:44px;border-radius:50%;background:#FFF1DE;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.bubble p{background:#FFF6E9;border-radius:4px 18px 18px 18px;padding:13px 16px;font-size:calc(16.5px * var(--ts));line-height:1.7;color:#4a3a26}
.field{margin:14px 0 6px}
.field label{display:block;font-size:calc(14.5px * var(--ts));font-weight:800;color:#9a6200;margin-bottom:8px}
.field input{width:100%;padding:16px;border:1.5px solid #EBD9C2;border-radius:16px;font-size:calc(17px * var(--ts));font-family:inherit;outline:none;background:#FFFDF9;color:#3A2E22}
.field input:focus{border-color:#c8784a}
.regions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.rchip{padding:12px 18px;border-radius:50px;border:1.5px solid #EBD9C2;background:#fff;color:#7a6650;font-size:calc(15px * var(--ts));font-weight:700;cursor:pointer;min-height:48px}
.rchip.on{background:#3A2A18;border-color:#3A2A18;color:#fff}
.bigbtn{width:100%;margin-top:20px;padding:19px;border:none;border-radius:18px;background:linear-gradient(135deg,#c8784a,#d4845a);color:#fff;font-size:calc(18.5px * var(--ts));font-weight:800;cursor:pointer;box-shadow:0 10px 22px -8px rgba(200,120,74,.55);min-height:60px}
.bigbtn:active{transform:scale(.98)}

/* 찾는 중 */
.loading{display:none;text-align:center;padding:44px 0}
.loading.on{display:block}
.loading .dot{display:inline-block;width:12px;height:12px;border-radius:50%;background:#c8784a;margin:0 5px;animation:bounce 1s infinite}
.loading .dot:nth-child(2){animation-delay:.15s}.loading .dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:none;opacity:.4}50%{transform:translateY(-10px);opacity:1}}
.loading p{margin-top:16px;font-size:calc(16px * var(--ts));color:#8a7560}

/* 결과 */
.result{display:none}
.result.on{display:block;animation:fade .4s ease}
.cheer{text-align:center;font-family:'Nanum Myeongjo','Batang',serif;font-size:calc(21px * var(--ts));font-weight:800;color:#3A2A18;line-height:1.55;margin:28px 0 18px}
.cheer em{font-style:normal;color:#c8784a}
.jobcard{background:#fff;border:1.5px solid rgba(200,120,74,.16);border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 4px 16px rgba(120,80,40,.06)}
.jobcard .match{display:inline-block;font-size:calc(13px * var(--ts));font-weight:800;color:#2E7D32;background:#EAF6EB;border-radius:50px;padding:5px 13px;margin-bottom:10px}
.jobcard h3{font-size:calc(19.5px * var(--ts));font-weight:800;color:#3A2A18;line-height:1.4}
.jobcard .why{margin-top:8px;font-size:calc(15px * var(--ts));line-height:1.7;color:#6b5a48}
.jobmeta{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.jm{font-size:calc(13.5px * var(--ts));color:#9A6200;background:#FFF4D6;border-radius:50px;padding:6px 13px;font-weight:700}
.applybtn{margin-top:14px;width:100%;padding:15px;border:1.5px solid rgba(200,120,74,.35);border-radius:14px;background:#FFF9F1;color:#c8784a;font-size:calc(16px * var(--ts));font-weight:800;cursor:pointer;min-height:52px}
.retry{display:block;margin:6px auto 0;background:none;border:none;color:#8a7560;font-size:calc(14.5px * var(--ts));font-weight:700;cursor:pointer;text-decoration:underline;padding:12px}

/* 지역 공고 캐러셀 */
.subhead{margin:34px 0 14px;font-size:calc(18px * var(--ts));font-weight:800;color:#3A2A18}
.subhead small{display:block;margin-top:5px;font-size:calc(14px * var(--ts));font-weight:400;color:#8a7560}
.carousel{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 14px;scroll-snap-type:x mandatory;-ms-overflow-style:none;scrollbar-width:none}
.carousel::-webkit-scrollbar{display:none}
.ccard{flex:0 0 78%;scroll-snap-align:start;background:#fff;border:1.5px solid rgba(200,120,74,.16);border-radius:18px;padding:18px;box-shadow:0 3px 14px rgba(120,80,40,.06)}
.ccard .loc{font-size:calc(13px * var(--ts));font-weight:800;color:#c8784a}
.ccard .src{display:inline-block;margin-left:7px;font-size:calc(11px * var(--ts));font-weight:800;color:#2E7D32;background:#EAF6EB;border-radius:50px;padding:2px 9px;vertical-align:1px}
.ccard h4{margin-top:6px;font-size:calc(17px * var(--ts));font-weight:800;color:#3A2A18;line-height:1.45}
.ccard p{margin-top:7px;font-size:calc(14px * var(--ts));color:#8a7560;line-height:1.6}
.swipehint{text-align:center;font-size:calc(13px * var(--ts));color:#b5a48f}

/* ── 2. 적성 찾기 ── */
.quizbox{background:#fff;border:1.5px solid rgba(200,120,74,.16);border-radius:22px;padding:28px 22px;text-align:center;box-shadow:0 4px 18px rgba(120,80,40,.07)}
.qprog{display:flex;gap:7px;justify-content:center;margin-bottom:22px}
.qdot{width:11px;height:11px;border-radius:50%;background:#EBD9C2}
.qdot.on{background:#c8784a}
.qemoji{font-size:52px;line-height:1}
.qtext{margin:18px 0 26px;font-family:'Nanum Myeongjo','Batang',serif;font-size:calc(21px * var(--ts));font-weight:800;color:#3A2A18;line-height:1.6;min-height:66px}
.qbtns{display:flex;gap:12px}
.qbtn{flex:1;padding:18px 8px;border-radius:18px;border:none;font-size:calc(17.5px * var(--ts));font-weight:800;cursor:pointer;min-height:62px}
.qyes{background:linear-gradient(135deg,#c8784a,#d4845a);color:#fff;box-shadow:0 8px 18px -8px rgba(200,120,74,.55)}
.qno{background:#F4EBDD;color:#7a6650}
.qbtn:active{transform:scale(.97)}
/* 적성 결과 */
.aresult{display:none;text-align:center}
.aresult.on{display:block;animation:fade .4s ease}
.abadge{width:96px;height:96px;border-radius:50%;background:#FFF1DE;display:flex;align-items:center;justify-content:center;font-size:48px;margin:6px auto 16px}
.atype{font-family:'Nanum Myeongjo','Batang',serif;font-size:calc(24px * var(--ts));font-weight:800;color:#c8784a}
.adesc{margin:14px 0 20px;font-size:calc(16px * var(--ts));line-height:1.8;color:#4a3a26}
.ajobs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ajob{font-size:calc(14.5px * var(--ts));font-weight:800;color:#9A6200;background:#FFF4D6;border-radius:50px;padding:9px 16px}

/* ── 3. 새로운 시작 가이드 ── */
.gcard{position:relative;border-radius:24px;overflow:hidden;margin-bottom:18px;cursor:pointer;border:none;width:100%;text-align:left;padding:0;box-shadow:0 8px 24px rgba(120,80,40,.12)}
.gthumb{height:150px;display:flex;align-items:center;justify-content:center;font-size:62px}
.g1 .gthumb{background:linear-gradient(135deg,#FFE3C2,#FFD3A8)}
.g2 .gthumb{background:linear-gradient(135deg,#DCEFDA,#C4E4C0)}
.g3 .gthumb{background:linear-gradient(135deg,#FFE1D6,#FFCFC0)}
.gbody{background:#fff;padding:20px 22px 22px}
.gtag{display:inline-block;font-size:calc(12.5px * var(--ts));font-weight:800;color:#c8784a;background:#FFF1E4;border-radius:50px;padding:5px 13px}
.gbody h3{margin-top:10px;font-family:'Nanum Myeongjo','Batang',serif;font-size:calc(20px * var(--ts));font-weight:800;color:#3A2A18;line-height:1.45}
.gbody p{margin-top:8px;font-size:calc(15px * var(--ts));line-height:1.7;color:#6b5a48}
.gopen{margin-top:14px;display:inline-block;font-size:calc(15px * var(--ts));font-weight:800;color:#c8784a}

/* 가이드 상세 모달 */
.modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(58,42,24,.45);align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.sheet{width:100%;max-width:600px;max-height:86vh;overflow-y:auto;background:#FFFBF4;border-radius:26px 26px 0 0;padding:26px 22px 40px;animation:up .3s ease}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheet h3{font-family:'Nanum Myeongjo','Batang',serif;font-size:calc(21px * var(--ts));font-weight:800;color:#3A2A18;line-height:1.5;padding-right:44px}
.close{position:absolute;margin-left:auto;background:#F4EBDD;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;color:#7a6650;cursor:pointer;float:right}
.step{display:flex;gap:14px;margin-top:20px;align-items:flex-start}
.stepno{width:38px;height:38px;border-radius:50%;background:#FFF1DE;color:#c8784a;font-weight:800;font-size:calc(16px * var(--ts));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step div b{display:block;font-size:calc(16.5px * var(--ts));color:#3A2A18;margin-bottom:4px}
.step div span{font-size:calc(15px * var(--ts));line-height:1.7;color:#6b5a48}

/* 이력서 템플릿 */
.tpl .field{margin:16px 0 0}
.tpl textarea{width:100%;padding:15px;border:1.5px solid #EBD9C2;border-radius:16px;font-size:calc(16px * var(--ts));font-family:inherit;outline:none;background:#fff;color:#3A2E22;resize:none;line-height:1.6}
.tpl textarea:focus{border-color:#c8784a}
.copied{display:none;text-align:center;margin-top:12px;font-size:calc(15px * var(--ts));font-weight:800;color:#2E7D32}
.copied.on{display:block}
</style>
</head>
<body>
<header>
  <a class="back" href="/">← 홈으로</a>
  <span class="htitle">시니어 직업 상담소</span>
</header>

<div class="wrap">
  <div class="hero">
    <h1>인생 2막,<br><em>새 일터</em>를 함께 찾아봐요</h1>
    <p>수십 년 쌓아온 경험은 그 자체로 보물이에요.<br>그 보물이 빛날 자리, 봄이가 찾아드릴게요 🌷</p>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab on" data-sec="s1" role="tab">💼 내 일자리<br>찾기</button>

  <section class="sec on" id="s1">
    <div class="chatcard" id="askCard">
      <div class="bubble">
        <div class="bom">🌸</div>
        <p>그동안 어떤 일을 해오셨어요?<br>편하게 말씀해 주시면 꼭 맞는 자리를 찾아볼게요.</p>
      </div>
      <div class="field">
        <label>지난 날의 나의 일</label>
        <input id="career" type="text" placeholder="예: 은행원 20년, 식당 운영 15년" autocomplete="off">

      <div class="field">
        <label>일하고 싶은 동네</label>
        <div class="regions" id="regions"></div>
      </div>
      <button class="bigbtn" id="findBtn">🔎 내게 맞는 일자리 찾기</button>
    </div>

    <div class="loading" id="loading">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <p>봄이가 꼭 맞는 자리를 찾고 있어요…</p>

    <div class="result" id="result">
      <p class="cheer" id="cheerMsg"></p>
      <div id="jobList"></div>
      <button class="retry" id="retryBtn">다시 찾아보기</button>
    </div>

    <h2 class="subhead">🗺️ 우리 동네 채용 소식
      <small id="noticeSub">복지관·요양·주야간보호까지 여러 곳에서 모았어요 · 옆으로 넘겨보세요 →</small>
    </h2>
    <div class="carousel" id="carousel"></div>
  </section>

  <!-- ═══ 2. 숨은 적성 찾기 ═══ -->
  <section class="sec" id="s2">
    <div class="quizbox" id="quizBox">
      <div class="qprog" id="qprog"></div>
      <div class="qemoji" id="qemoji">🤔</div>
      <p class="qtext" id="qtext"></p>
      <div class="qbtns">
        <button class="qbtn qyes" id="qyes">👍 좋아요</button>
        <button class="qbtn qno" id="qno">🤔 글쎄요</button>
      </div>
    </div>
    <div class="quizbox aresult" id="aresult">
      <div class="abadge" id="abadge"></div>
      <p style="font-size:calc(15px * var(--ts));color:#8a7560">당신의 숨은 적성은…</p>
      <p class="atype" id="atype"></p>
      <p class="adesc" id="adesc"></p>
      <p style="font-size:calc(14.5px * var(--ts));font-weight:800;color:#9a6200;margin-bottom:10px">이런 일과 잘 어울려요</p>
      <div class="ajobs" id="ajobs"></div>
      <button class="retry" id="aretry" style="margin-top:22px">다시 해보기</button>
    </div>
  </section>

  <!-- ═══ 3. 새로운 시작 가이드 ═══ -->
  <section class="sec" id="s3">
    <button class="gcard g1" data-guide="g1">
      <div class="gthumb">🎓</div>
      <div class="gbody">
        <span class="gtag">나라가 내는 배움 비용</span>
        <h3>배우고 싶던 그 공부,<br>이제 나라 돈으로 하세요</h3>
        <p>내일배움카드 하나면 최대 500만 원까지 지원받아요. 신청 방법, 차근차근 알려드려요.</p>
        <span class="gopen">읽어보기 →</span>
      </div>
    </button>
    <button class="gcard g2" data-guide="g2">
      <div class="gthumb">🏅</div>
      <div class="gbody">
        <span class="gtag">다시 찾는 인기 자격증</span>
        <h3>지금 시작해도<br>충분히 늦지 않았어요</h3>
        <p>시니어 채용이 활발한 자격증만 골랐어요. 준비 기간과 가는 길을 한눈에 보여드려요.</p>
        <span class="gopen">읽어보기 →</span>
      </div>
    </button>
    <button class="gcard g3" data-guide="g3">
      <div class="gthumb">✍️</div>
      <div class="gbody">
        <span class="gtag">합격을 부르는 한 장</span>
        <h3>내 이야기를 담으면<br>이력서가 살아나요</h3>
        <p>빈칸만 채우면 완성되는 이력서 틀을 준비했어요. 수십 년 경험을 자랑스럽게 담아보세요.</p>
        <span class="gopen">빈칸 채우기 틀 열기 →</span>
      </div>
    </button>
  </section>
</div>

<!-- 가이드 모달 -->

  <div class="sheet" id="sheet"></div>
</div>

function ensureAuth(){
  return new Promise(function(resolve,reject){
    function go(){
      if(!window.firebase||!firebase.auth){ setTimeout(go,120); return; }
      if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
      var un=firebase.auth().onAuthStateChanged(function(u){ un();   // 복원 대기 — 소셜 세션 보호
        if(u){ resolve(u); return; }
        firebase.auth().signInAnonymously().then(function(r){ resolve(r.user); }).catch(reject);
      });
    }
    go();
  });
}
function callFn(name,payload){
  return ensureAuth().then(function(){
    return firebase.app().functions('asia-northeast3').httpsCallable(name)(payload);
  });
}

     '<p style="margin-top:12px;font-size:calc(16px * var(--ts));line-height:1.8;color:#6b5a48">상담사가 곧 전화드릴 거예요.<br>모르는 번호여도 한 번만 받아봐 주세요 ☎️</p></div>';
  }).catch(function(){
    msg.style.color='#c0392b';msg.textContent='지금은 접수가 어려워요. 잠시 뒤 다시 눌러주세요 🙏';
  });
}

/* 이력서 빈칸 채우기 템플릿 */
function openResume(){
  sheet.innerHTML='<button class="close" onclick="closeModal()">✕</button>'+
   '<h3>✍️ 빈칸만 채우면 완성되는 이력서</h3>'+
   '<div class="tpl">'+
   '<div class="field"><label>내가 오래 해온 일</label><textarea id="r1" rows="2" placeholder="예: OO은행에서 20년간 창구 업무를 맡았습니다"></textarea></div>'+
   '<div class="field"><label>내가 제일 잘하는 것</label><textarea id="r2" rows="2" placeholder="예: 처음 온 손님도 단골로 만드는 친절함"></textarea></div>'+
   '<div class="field"><label>새 일터에서 하고 싶은 것</label><textarea id="r3" rows="2" placeholder="예: 오랜 경험으로 손님들을 편안하게 맞이하고 싶습니다"></textarea></div>'+
   '<button class="bigbtn" onclick="copyResume()">📋 완성된 자기소개 복사하기</button>'+
   '<p class="copied" id="copied">복사됐어요! 지원서에 붙여넣으세요 ✅</p></div>';
  modal.classList.add('on');
}
function copyResume(){
  const v=i=>document.getElementById(i).value.trim()||'(빈칸)';
  const text='[나의 경력]\n'+v('r1')+'\n\n[나의 강점]\n'+v('r2')+'\n\n[포부]\n'+v('r3');
  (navigator.clipboard?navigator.clipboard.writeText(text):Promise.reject()).catch(()=>{});
  document.getElementById('copied').classList.add('on');
}
</script>
