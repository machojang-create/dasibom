<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 처리 중 — 다시봄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#FFFDE7;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:24px;padding:48px 36px;max-width:360px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(121,85,72,.12);border:1.5px solid rgba(255,213,79,.3)}
.icon{font-size:52px;margin-bottom:16px;line-height:1}
.title{font-size:20px;font-weight:800;color:#4E342E;margin-bottom:10px;line-height:1.4}
.sub{font-size:14px;color:#795548;line-height:1.8;white-space:pre-line}
.sub.err{color:#C62828;font-weight:700;font-size:15px;background:#FFF3F3;border-radius:10px;padding:12px;margin-top:8px}
.spinner{display:inline-block;width:36px;height:36px;border:4px solid rgba(121,85,72,.15);border-top-color:#FFD54F;border-radius:50%;animation:spin .9s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div id="spinner" class="spinner"></div>
  <div class="icon" id="ei" style="display:none"></div>
  <div class="title" id="msg">로그인 확인 중입니다</div>
  <div class="sub"  id="sub">잠시만 기다려 주세요...</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"
  onerror="showErr('Firebase SDK 로드 실패. 네트워크를 확인하세요.')"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-functions-compat.js"
  onerror="showErr('Firebase Functions SDK 로드 실패.')"></script>

<script>
// ── UI 헬퍼 ──
function showErr(msg){
  console.error('[kakao-callback] ERROR:', msg);
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('ei').style.display      = 'block';
  document.getElementById('ei').textContent        = '⚠️';
  document.getElementById('msg').textContent       = '로그인 중 문제가 발생했습니다';
  var sub = document.getElementById('sub');
  sub.className = 'sub err';
  sub.textContent = '에러 내용: ' + msg;
  // 6초 후 메인으로
  setTimeout(function(){ location.href = '/'; }, 6000);
}
function showOk(msg, sub){
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('ei').style.display      = 'block';
  document.getElementById('ei').textContent        = '✅';
  document.getElementById('msg').textContent       = msg;
  document.getElementById('sub').textContent       = sub || '';
}

// ── localStorage ──
function lsSet(k, v){ try{ localStorage.setItem('memoir_' + k, JSON.stringify(v)); }catch(e){} }

// ── 메인 ──
(function(){
  try {
    // ── Step 1: 인가 코드 확인 ──
    console.log('[Step 1] URL 파라미터 파싱 시작');
    var params = new URLSearchParams(location.search);
    var code   = params.get('code');
    var error  = params.get('error');
    console.log('[Step 1] code 존재:', !!code, '/ error:', error || 'none');

    if(error){
      showOk('로그인이 취소되었습니다', '메인 화면으로 돌아갑니다.');
      setTimeout(function(){ location.href = '/'; }, 2000);
      return;
    }
    if(!code){
      showErr('인가 코드(code)가 URL에 없습니다. 카카오 콘솔 Redirect URI를 확인하세요.');
      return;
    }

    // ── Step 2: Firebase 초기화 + Function 호출 ──
    console.log('[Step 2] Firebase 초기화 시작');
    if(typeof firebase === 'undefined'){
      showErr('Firebase SDK가 로드되지 않았습니다.');
      return;
    }
    if(!firebase.apps.length){
      firebase.initializeApp({
        apiKey   : 'AIzaSyAZAhBAsrKcXnznnx8_0oF2gyYC0WbvoP0',
        projectId: 'mylife-650f0'
      });
    }
    // compat 모드에서 리전 지정: firebase.app().functions('리전')
    var fns = firebase.app().functions('asia-northeast3');
    console.log('[Step 2] firebase.app().functions(asia-northeast3) 초기화 완료');

    var kakaoAuth = fns.httpsCallable('kakaoAuth');

    // 10초 타임아웃
    var timedOut = false;
    var timer = setTimeout(function(){
      timedOut = true;
      showErr('서버 응답 없음 (10초 초과). 잠시 후 다시 시도해 주세요.');
    }, 10000);

    console.log('[Step 2] kakaoAuth Function 호출 중...');
    kakaoAuth({ code: code })
      .then(function(result){
        if(timedOut) return;
        clearTimeout(timer);

        // ── Step 3: 성공 처리 ──
        var d = result.data;
        console.log('[Step 3] 응답 성공. name:', d.name, '/ email:', d.email);
        lsSet('socialProvider', 'kakao');
        lsSet('userName',  d.name  || '');
        if(d.email) lsSet('userEmail', d.email);

        showOk('로그인 완료!', '다시봄으로 이동합니다.');
        setTimeout(function(){ location.href = '/'; }, 1200);
      })
      .catch(function(err){
        if(timedOut) return;
        clearTimeout(timer);

        // ── Step 3: 실패 처리 ──
        console.error('[Step 3] 응답 실패. code:', err.code, '/ message:', err.message);
        showErr('오류 코드: ' + (err.code || '?') + '\n' + (err.message || '알 수 없는 오류'));
      });

  } catch(e) {
    // 예상치 못한 동기 에러 전부 잡기
    showErr('예외 발생: ' + (e.message || String(e)));
  }
})();
</script>
</body>
</html>
