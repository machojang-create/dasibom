<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 처리 중 — 다시봄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#FFFDE7;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:24px;padding:48px 36px;max-width:420px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(121,85,72,.12);border:1.5px solid rgba(255,213,79,.3)}
.icon{font-size:52px;margin-bottom:16px;line-height:1}
.title{font-size:20px;font-weight:800;color:#4E342E;margin-bottom:10px;line-height:1.4}
.sub{font-size:13px;color:#795548;line-height:1.8;white-space:pre-wrap;word-break:break-all}
.sub.err{color:#C62828;font-weight:600;font-size:13px;background:#FFF3F3;border-radius:10px;padding:12px;margin-top:8px;text-align:left}
.spinner{display:inline-block;width:36px;height:36px;border:4px solid rgba(121,85,72,.15);border-top-color:#03C75A;border-radius:50%;animation:spin .9s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div id="spinner" class="spinner"></div>
  <div class="icon" id="ei" style="display:none"></div>
  <div class="title" id="msg">로그인 확인 중입니다</div>
  <div class="sub"  id="sub">잠시만 기다려 주세요...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"
  onerror="showErr('Firebase SDK 로드 실패')"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"
  onerror="showErr('Firebase Auth SDK 로드 실패')"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-functions-compat.js"
  onerror="showErr('Firebase Functions SDK 로드 실패')"></script>

<script>
function showErr(msg){
  console.error('[naver-callback] ERROR:', msg);
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('ei').style.display = 'block';
  document.getElementById('ei').textContent = '⚠️';
  document.getElementById('msg').textContent = '로그인 중 문제가 발생했습니다';
  var sub = document.getElementById('sub');
  sub.className = 'sub err';
  sub.textContent = msg;
  setTimeout(function(){ location.href = '/'; }, 8000);
}
function showOk(msg, sub){
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('ei').style.display = 'block';
  document.getElementById('ei').textContent = '✅';
  document.getElementById('msg').textContent = msg;
  document.getElementById('sub').textContent = sub || '';
}
function lsSet(k, v){ try{ localStorage.setItem('memoir_' + k, JSON.stringify(v)); }catch(e){} }

(function(){
  // URL 파라미터 전체 노출 (디버깅)
  console.log('[naver-callback] 현재 URL:', location.href);

  try {
    var params = new URLSearchParams(location.search);
    var code   = params.get('code');
    var state  = params.get('state');
    var error  = params.get('error');
    var errorDesc = params.get('error_description');

    console.log('[naver-callback] code:', code ? code.slice(0,10)+'...' : 'NONE',
                '/ error:', error, '/ error_description:', errorDesc);

    // 네이버가 에러를 query param으로 보낸 경우
    if(error){
      if(error === 'access_denied'){
        showErr('등록되지 않은 테스터입니다.\n네이버 개발자 콘솔 → 멤버 관리 → 테스터 ID에 아이디를 추가해주세요.');
      } else {
        showErr('네이버 에러: ' + error + '\n설명: ' + (errorDesc || '없음'));
      }
      return;
    }
    if(!code){
      // URL 전체를 보여줘서 진단 가능하게
      showErr('인가 코드(code)가 URL에 없습니다.\n\n현재 URL 파라미터:\n' + location.search);
      return;
    }

    // state 검증
    var savedState = sessionStorage.getItem('naver_state');
    console.log('[naver-callback] state 검증 — URL:', state, '/ 저장:', savedState);
    if(savedState && state && savedState !== state){
      alert('[State 불일치]\nURL state: ' + state + '\n저장된 state: ' + savedState);
    }

    if(typeof firebase === 'undefined'){
      showErr('Firebase SDK 미로드 — 네트워크 확인 필요');
      return;
    }
    if(!firebase.apps.length){
      firebase.initializeApp({
        apiKey   : 'AIzaSyAZAhBAsrKcXnznnx8_0oF2gyYC0WbvoP0',
        projectId: 'mylife-650f0'
      });
    }
    var fns = firebase.app().functions('asia-northeast3');
    var naverAuth = fns.httpsCallable('naverAuth');

    var timedOut = false;
    var timer = setTimeout(function(){
      timedOut = true;
      showErr('서버 응답 없음 (10초 초과).\n잠시 후 다시 시도해 주세요.');
    }, 10000);

    console.log('[naver-callback] naverAuth 호출 시작...');
    naverAuth({ code: code, state: state || '' })
      .then(function(result){
        if(timedOut) return;
        clearTimeout(timer);
        var d = result.data;
        console.log('[naver-callback] 성공. name:', d.name, '/ email:', d.email);
        lsSet('socialProvider', 'naver');
        lsSet('userName',  d.name  || '');
        if(d.email) lsSet('userEmail', d.email);

        // 센터 스태프(/admin 등) 로그인이면 실제 Firebase Auth 세션까지 발급
        var target = sessionStorage.getItem('dasibom_login_target') || '';
        sessionStorage.removeItem('dasibom_login_target');
        var dest = (target === 'admin') ? '/admin' : (target === 'kiosk') ? '/kiosk' : '/';
        var go = d.customToken ? firebase.auth().signInWithCustomToken(d.customToken) : Promise.resolve();
        go.then(function(){
          showOk('로그인 완료!', '이동합니다.');
          setTimeout(function(){ location.href = dest; }, 1200);
        }).catch(function(e){
          showErr('인증 세션 발급 실패: ' + e.message);
        });
      })
      .catch(function(err){
        if(timedOut) return;
        clearTimeout(timer);

        // 에러 전체를 JSON으로 직렬화해서 화면에 출력
        var detail = '';
        try { detail = JSON.stringify(err, Object.getOwnPropertyNames(err), 2); } catch(e) { detail = String(err); }
        console.error('[naver-callback] naverAuth 실패:', detail);

        showErr(
          '에러 코드: ' + (err.code || '?') + '\n'
        + '메시지: '   + (err.message || '알 수 없는 오류') + '\n'
        + (err.details ? '상세: ' + JSON.stringify(err.details) + '\n' : '')
        + '\n[전체 에러 객체]\n' + detail
        );
      });

  } catch(e) {
    showErr('예외 발생: ' + (e.message || String(e)) + '\n스택: ' + (e.stack || ''));
  }
})();
</script>
</body>
</html>
