<script>
var ERAS = ['전체','1970년대','1980년대','1990년대','2000년대','2010년대','2020년대'];
var LS_ALBUM = 'dasibom_trendy_album';
function esc(s){ return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function popToast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; clearTimeout(t._h); t._h=setTimeout(function(){t.style.opacity=0;},2000); }
function loadAlbumLocal(){ try{ return JSON.parse(localStorage.getItem(LS_ALBUM))||[]; }catch(e){ return []; } }
function saveAlbumLocal(arr){ try{ localStorage.setItem(LS_ALBUM, JSON.stringify(arr)); }catch(e){} }
function isSaved(id){ return loadAlbumLocal().indexOf(id)>-1; }

/* ── 실제 로그인 사용자 즐겨찾기(앨범) — Firestore 동기화, 기기 바뀌어도 유지 ── */
var FB_CFG = {
  apiKey:"AIzaSyAZAhBAsrKcXnznnx8_0oF2gyYC0WbvoP0",
  authDomain:"mylife-650f0.firebaseapp.com",
  projectId:"mylife-650f0",
  storageBucket:"mylife-650f0.firebasestorage.app",
  messagingSenderId:"512010655611",
  appId:"1:512010655611:web:32b153b836b23ae96a8fde"
};
var _db=null, _cloudReady=false;
function _ensureAuth(){
  return new Promise(function(resolve,reject){
    function go(){
      if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
      _db = firebase.firestore();
      var un=firebase.auth().onAuthStateChanged(function(u){ un();   // 복원 대기 — 소셜 세션 보호
        if(u){ resolve(u.uid); return; }
        firebase.auth().signInAnonymously().then(function(r){ resolve(r.user.uid); }).catch(reject);
      });
    }
    if(window.firebase && firebase.firestore) go();
    else { var n=0; (function poll(){ if(window.firebase&&firebase.firestore){ go(); return; } if(++n<40) setTimeout(poll,250); else reject(new Error('firebase load timeout')); })(); }
  });
}
function syncAlbumFromCloud(){
  _ensureAuth().then(function(uid){
    return _db.collection('trendy_albums').doc(uid).get().then(function(doc){
      var cloudArr = (doc.exists && doc.data().words) || [];
      var localArr = loadAlbumLocal();
      // 로그인 전 로컬에만 있던 항목도 합쳐서 보존(기기 이전·비로그인 사용 흔적 손실 방지)
      var merged = cloudArr.slice();
      localArr.forEach(function(id){ if(merged.indexOf(id)===-1) merged.push(id); });
      saveAlbumLocal(merged);
      _cloudReady = true;
      if(merged.length !== cloudArr.length){
        _db.collection('trendy_albums').doc(uid).set({ words: merged, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      }
      renderActivePane();
    });
  }).catch(function(){ /* 오프라인 등 — 로컬 데이터로 계속 동작 */ });
}
function toggleSave(id){
  var arr=loadAlbumLocal();
  var i=arr.indexOf(id);
  var adding = i===-1;
  if(i>-1){ arr.splice(i,1); popToast('앨범에서 뺐어요'); } else { arr.push(id); popToast('앨범에 담았어요 💛'); }
  saveAlbumLocal(arr);
  _ensureAuth().then(function(uid){
    var ref=_db.collection('trendy_albums').doc(uid);
    var op = adding
      ? { words: firebase.firestore.FieldValue.arrayUnion(id) }
      : { words: firebase.firestore.FieldValue.arrayRemove(id) };
    op.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    ref.set(op, { merge: true });
  }).catch(function(){ /* 오프라인 — 로컬엔 이미 반영됨, 다음 접속 시 자동 동기화 */ });

/* ── 퀴즈 ── */
var qz={era:null, questions:[], idx:0, score:0, answered:null};
function genQuiz(era){
  var data=window.TRENDY_WORDS||[];
  var pool = era==='전체' ? data : data.filter(function(w){ return w.era===era; });
  if(pool.length<5) pool=data;
  var picked=pool.slice().sort(function(){ return Math.random()-0.5; }).slice(0,5);
  return picked.map(function(target){
    var wrongs=data.filter(function(w){ return w.id!==target.id; }).sort(function(){ return Math.random()-0.5; }).slice(0,3).map(function(w){ return w.meaning; });
    var options=[target.meaning].concat(wrongs).sort(function(){ return Math.random()-0.5; });
    return { word:target.word, meaning:target.meaning, options:options, answer:target.meaning, example:target.example };
  });
}
function renderQuizPick(){
  var html='<h3 style="font-size:18px;font-weight:800;text-align:center;margin-bottom:6px">어느 시대의 퀴즈를 풀어볼까요?</h3>'
    +'<div class="qz-pickgrid">'+ERAS.map(function(e){ return '<button class="qz-pick" data-era="'+esc(e)+'">'+esc(e)+'</button>'; }).join('')+'</div>';
  document.getElementById('qzCard').innerHTML=html;
  document.querySelectorAll('.qz-pick').forEach(function(btn){
    btn.addEventListener('click', function(){
      qz.era=btn.getAttribute('data-era'); qz.questions=genQuiz(qz.era); qz.idx=0; qz.score=0; qz.answered=null;
      renderQuizQuestion();
    });
  });
}
function renderQuizQuestion(){
  if(qz.idx>=qz.questions.length){ renderQuizResult(); return; }
  var q=qz.questions[qz.idx];
  var html='<div class="qz-progress">'+(qz.idx+1)+' / '+qz.questions.length+' · '+esc(qz.era)+'</div>'
    +'<div class="qz-meaning">"'+esc(q.word)+'"의 뜻은 무엇일까요?</div>'
    +q.options.map(function(opt,i){ return '<button class="qz-opt" data-opt="'+i+'">'+esc(opt)+'</button>'; }).join('')
    +'<button class="qz-next" id="qzNext" style="display:none">다음 →</button>';
  document.getElementById('qzCard').innerHTML=html;
  document.querySelectorAll('.qz-opt').forEach(function(btn,i){
    btn.addEventListener('click', function(){
      if(qz.answered!==null) return;
      qz.answered=i;
      var picked=q.options[i];
      document.querySelectorAll('.qz-opt').forEach(function(b,j){
        if(q.options[j]===q.answer) b.classList.add('correct');
        else if(j===i) b.classList.add('wrong');
      });
      if(picked===q.answer) qz.score++;
      document.getElementById('qzNext').style.display='block';
    });
  });
  document.getElementById('qzNext').addEventListener('click', function(){ qz.idx++; qz.answered=null; renderQuizQuestion(); });
}
function renderQuizResult(){
  var html='<div class="qz-result"><div style="font-size:15px;color:#8a7560">'+esc(qz.era)+' 결과</div>'
    +'<div class="score">'+qz.score+' / '+qz.questions.length+'</div>'
    +'<p style="font-size:15px;color:#4a3a26;margin-bottom:18px">'+(qz.score>=4?'대단해요! 트렌드 마스터예요 🎉':qz.score>=2?'꽤 잘 아시는데요? 😊':'재미로 즐기면 충분해요 🌱')+'</p>'
    +'<button class="qz-next" id="qzRetry">다시 시대 고르기</button></div>';
  document.getElementById('qzCard').innerHTML=html;
  document.getElementById('qzRetry').addEventListener('click', renderQuizPick);
}

/* ── 신조어 제보(커뮤니티) — Firestore 공개 컬렉션, 실시간 공감투표 ── */
var SUB_BAD=['시발','씨발','병신','개새','좆','니미','fuck','sex','섹스'];
function _subClean(t){ var s=t.replace(/\s/g,'').toLowerCase(); return !SUB_BAD.some(function(w){return s.indexOf(w)>=0;}); }
var _mySubVotes={}; // localStorage 캐시(내가 누른 투표 — UI 즉시반응용, 실제 막음은 서버 trendy_votes 문서)
function _loadMyVotes(){ try{ return JSON.parse(localStorage.getItem('dasibom_trendy_votes'))||{}; }catch(e){ return {}; } }
function _saveMyVotes(v){ try{ localStorage.setItem('dasibom_trendy_votes', JSON.stringify(v)); }catch(e){} }
_mySubVotes=_loadMyVotes();

function renderSubmissions(list){
  var box=document.getElementById('subList'); if(!box) return;
  if(!list.length){ box.innerHTML='<div class="empty">아직 제보된 말이 없어요.<br>위에서 첫 번째로 들려주세요 💡</div>'; return; }
  box.innerHTML=list.map(function(s){
    var voted=!!_mySubVotes[s.id];
    return '<div class="sub-item">'
      +'<div class="sub-item-body"><div class="sub-item-word">'+esc(s.word)+'</div>'
      +'<div class="sub-item-meaning">'+esc(s.meaning)+'</div>'
      +(s.example?'<div class="sub-item-example">💬 '+esc(s.example)+'</div>':'')+'</div>'
      +'<button class="sub-vote'+(voted?' on':'')+'" data-id="'+esc(s.id)+'"><span class="n">👍 '+(s.votes||0)+'</span><span class="l">공감</span></button>'
      +'</div>';
  }).join('');
}
function loadSubmissions(){
  var box=document.getElementById('subList'); if(box) box.innerHTML='<div class="empty">불러오는 중…</div>';
  _ensureAuth().then(function(){
    return _db.collection('trendy_submissions').orderBy('votes','desc').limit(100).get();
  }).then(function(snap){
    var arr=[]; snap.forEach(function(d){ arr.push(Object.assign({id:d.id}, d.data())); });
    renderSubmissions(arr);
  }).catch(function(e){
    var box=document.getElementById('subList'); if(box) box.innerHTML='<div class="empty">불러오지 못했어요. 잠시 후 다시 시도해 주세요.</div>';
  });
}
function submitWord(){
  var word=document.getElementById('subWord').value.trim();
  var meaning=document.getElementById('subMeaning').value.trim();
  var example=document.getElementById('subExample').value.trim();
  if(!word || !meaning){ popToast('단어와 뜻을 입력해 주세요'); return; }
  if(!_subClean(word+meaning+example)){ popToast('서로 따뜻한 말로 남겨주세요 🌸'); return; }
  var btn=document.getElementById('subBtn'); btn.disabled=true;
  _ensureAuth().then(function(uid){
    return _db.collection('trendy_submissions').add({
      word:word, meaning:meaning, example:example, uid:uid, votes:0,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    });
  }).then(function(){
    document.getElementById('subWord').value='';
    document.getElementById('subMeaning').value='';
    document.getElementById('subExample').value='';
    popToast('제보해 주셔서 감사해요 💡');
    loadSubmissions();
  }).catch(function(e){ popToast('제보에 실패했어요. 잠시 후 다시 시도해 주세요'); }).finally(function(){ btn.disabled=false; });
}
function toggleVote(subId, btn){
  var alreadyVoted=!!_mySubVotes[subId];
  _ensureAuth().then(function(uid){
    var subRef=_db.collection('trendy_submissions').doc(subId);
    var voteRef=_db.collection('trendy_votes').doc(subId+'_'+uid);
    var batch=_db.batch();
    if(alreadyVoted){
      batch.delete(voteRef);
      batch.update(subRef, { votes: firebase.firestore.FieldValue.increment(-1) });
    } else {
      batch.set(voteRef, { subId:subId, uid:uid, ts: firebase.firestore.FieldValue.serverTimestamp() });
      batch.update(subRef, { votes: firebase.firestore.FieldValue.increment(1) });
    }
    return batch.commit();
  }).then(function(){
    if(alreadyVoted) delete _mySubVotes[subId]; else _mySubVotes[subId]=true;
    _saveMyVotes(_mySubVotes);
    loadSubmissions();
  }).catch(function(){ popToast('공감 처리에 실패했어요'); });
}
document.getElementById('subBtn').addEventListener('click', submitWord);
document.getElementById('subList').addEventListener('click', function(e){
  var btn=e.target.closest('.sub-vote'); if(!btn) return;
  btn.disabled=true;
  toggleVote(btn.getAttribute('data-id'), btn);
  setTimeout(function(){ btn.disabled=false; }, 600);
});

var TR_MAP=[['진짜','완전 폼 미쳤다'],['최고','찢었다'],['인정','인정~ 어 인정'],['좋아','오히려 좋아'],['수고','오운완(오늘 운동 완료 아님)'],['안녕','방가방가'],['동의','디토'],['대박','대박적']];
var trMode='toSlang';
function doTranslate(){
  var input=document.getElementById('trInput').value;
  var result=input;
  if(trMode==='toSlang'){
    TR_MAP.forEach(function(p){ result=result.split(p[0]).join(p[1]); });
    if(result===input && input.length>0) result+='... 완전 럭키비키잖아! 🍀';
  } else {
    TR_MAP.slice().reverse().forEach(function(p){ result=result.split(p[1]).join(p[0]); });
    result=result.split('럭키비키').join('운이 좋은');
  }
  document.getElementById('trOutput').textContent = result || '결과가 여기에 표시됩니다.';
}
document.getElementById('trMode').addEventListener('click', function(){
  trMode = trMode==='toSlang' ? 'toNormal' : 'toSlang';

});
document.getElementById('trBtn').addEventListener('click', doTranslate);

/* ── 트렌드 테스트 ── */
var TEST_Q=[
  {q:'친구가 "나 완전 럭키비키잖아~"라고 했을 때 나의 반응은?', a:'무슨 소리야? 비키가 누구야? (머쓱)', b:'오! 완전 원영적 사고! 긍정적이라 보기 좋아 (맞장구)'},
  {q:'요즘 핫한 카페에서 인증샷을 찍을 때 나의 포즈는?', a:'정직하게 카메라를 응시하며 V (브이)', b:'거울 샷, 힙한 앵글 등 다양한 각도 활용'},
  {q:'새로운 밈(Meme)을 접했을 때 나의 행동은?', a:'이게 왜 웃긴 거지? 하며 조용히 넘어간다', b:'바로 손주에게 보여주며 같이 웃는다'}
];
var testStep=0, testScore=0;
function renderTest(){
  if(testStep>=TEST_Q.length){
    var title = testScore===3 ? '트렌드 세터 😎' : testScore===2 ? '트렌드 팔로워 😌' : '마이웨이 은둔 고수 👴';
    var desc = testScore===3 ? '요즘 말도 척척! 손주들과 대화가 즐거우시겠어요.' : testScore===2 ? '유행에 뒤처지진 않지만, 앞장서지도 않는 무난한 타입이에요.' : '유행보다는 나만의 길을 걷는 줏대 있는 분이세요.';
    document.getElementById('testCard').innerHTML =
      '<div style="text-align:center"><div class="test-result-badge">'+title+'</div>'
      +'<p style="font-size:15px;color:#4a3a26;line-height:1.7;margin-bottom:18px">'+desc+'</p>'
      +'<button class="qz-next" id="testRetry">다시 하기</button></div>';
    document.getElementById('testRetry').addEventListener('click', function(){ testStep=0; testScore=0; renderTest(); });
    return;
  }
  var q=TEST_Q[testStep];
  document.getElementById('testCard').innerHTML =
    '<div class="test-step">Q '+(testStep+1)+' / '+TEST_Q.length+'</div>'
    +'<div class="test-q">'+esc(q.q)+'</div>'

    +'<button class="test-opt" data-pt="1">'+esc(q.b)+'</button>';
  document.querySelectorAll('.test-opt').forEach(function(btn){
    btn.addEventListener('click', function(){ testScore+=parseInt(this.getAttribute('data-pt'),10); testStep++; renderTest(); });
  });
}

function drawFortune(){

var activeTab='dict';
function renderActivePane(){
  if(activeTab==='dict') renderDict();

function boot(){

  syncAlbumFromCloud();
}
boot();
