<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A8D5AB"/><stop offset="1" stop-color="#4E9A57"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B5804F"/><stop offset="1" stop-color="#8A5A32"/>
    </linearGradient>
    <linearGradient id="bagflap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C99364"/><stop offset="1" stop-color="#A56C3E"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- 은은한 해 -->
  <circle cx="640" cy="96" r="58" fill="#FFF3C8" opacity="0.85"/>
  <circle cx="640" cy="96" r="80" fill="#FFF3C8" opacity="0.25"/>

  <!-- 언덕 -->
  <path d="M0 360 Q 200 300 420 348 T 800 340 L 800 450 L 0 450 Z" fill="#3F7F49" opacity="0.55"/>
  <path d="M0 396 Q 260 344 520 388 T 800 380 L 800 450 L 0 450 Z" fill="#356B3E" opacity="0.7"/>

  <!-- 서류가방 -->
  <g transform="translate(250 150)">
    <rect x="98" y="-6" width="104" height="46" rx="16" fill="none" stroke="#6E4526" stroke-width="16"/>
    <rect x="0" y="26" width="300" height="188" rx="26" fill="url(#bag)"/>
    <rect x="0" y="26" width="300" height="74" rx="26" fill="url(#bagflap)"/>
    <rect x="126" y="84" width="48" height="34" rx="9" fill="#F6E7C8"/>
    <rect x="126" y="98" width="48" height="6" fill="#8A5A32" opacity="0.5"/>
  </g>

  <!-- 가방에서 돋는 새싹 — 인생 2막 -->
  <g transform="translate(400 128)">
    <path d="M0 46 C 0 16 0 6 0 -8" stroke="#2F6B38" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M0 -4 C -8 -34 -40 -44 -58 -38 C -52 -10 -24 4 0 -4 Z" fill="#7FCB8A"/>
    <path d="M0 -8 C 6 -40 38 -52 58 -46 C 54 -16 26 0 0 -8 Z" fill="#5DB56A"/>
  </g>

  <!-- 흩날리는 꽃잎(다시봄) -->
  <g fill="#FFC9D4">
    <ellipse cx="140" cy="120" rx="12" ry="7" transform="rotate(-24 140 120)"/>
    <ellipse cx="196" cy="196" rx="9" ry="5.5" transform="rotate(18 196 196)" opacity="0.85"/>
    <ellipse cx="636" cy="230" rx="11" ry="6.5" transform="rotate(-40 636 230)" opacity="0.9"/>
    <ellipse cx="580" cy="150" rx="8" ry="5" transform="rotate(30 580 150)" opacity="0.8"/>
  </g>
</svg>
