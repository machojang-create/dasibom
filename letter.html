<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음의 유언 — 미래에 전하는 편지 · 다시봄</title>
<meta name="description" content="사랑하는 이에게 지금 마음을 적어두면, 약속한 날에 전해드립니다.">
<script src="/a11y.js?v=6" defer></script>
<script src="/attend.js?v=3" defer></script>
<script src="/bom_voice.js?v=9" defer></script>
<script src="/bom_guide.js?v=1" defer></script>
<script>window.BOM_GUIDES={
  letter_new:{face:'bom_calm.png',title:'💌 새 편지 쓰기',text:'사랑하는 사람에게 먼 훗날 전할 편지를 쓸 수 있어요. 받는 분과 전할 날짜를 정하고, 마음을 천천히 담아보세요.'}
};</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#F5F1E8;color:#1F2A1A;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 18px 40px}
header{position:sticky;top:0;z-index:100;background:rgba(245,241,232,.96);backdrop-filter:blur(10px);border-bottom:1px solid rgba(63,90,48,.12);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:19px;font-weight:800;color:#3F5A30;text-decoration:none}
.back{border:1.5px solid rgba(63,90,48,.25);color:#3F5A30;background:none;font-size:14px;font-weight:700;padding:8px 16px;border-radius:50px;cursor:pointer;text-decoration:none}
.hero{padding:34px 0 6px;text-align:center}
.hero h1{font-family:'Nanum Myeongjo','Batang',serif;font-size:clamp(24px,6vw,30px);font-weight:800;color:#143D2E;line-height:1.45}
.hero p{margin-top:12px;font-size:15.5px;color:#3E5548;line-height:1.8}
.notice{margin:20px 0 24px;background:#E9F6F0;border:1px solid #BFE5D6;border-radius:14px;padding:13px 16px;font-size:13.5px;color:#1E5A47;line-height:1.7}
.btn-new{display:block;width:100%;padding:19px 0;border:none;border-radius:50px;background:linear-gradient(145deg,#7A9A5E,#5C7A4A);color:#fff;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 8px 22px -8px rgba(92,122,74,.55);font-family:inherit;margin-bottom:26px}
.lst-title{font-size:13px;font-weight:800;letter-spacing:1.5px;color:#56705F;margin-bottom:12px}
.card{background:#fff;border:1.5px solid rgba(63,90,48,.14);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 3px 14px rgba(10,92,73,.06)}
.card-to{font-family:'Nanum Myeongjo','Batang',serif;font-size:19px;font-weight:800;color:#143D2E;margin-bottom:4px}
.card-meta{font-size:13.5px;color:#4A5550;margin-bottom:10px;line-height:1.7}
.card-meta b{color:#3F5A30}
.due{display:inline-block;background:#FFF4E0;color:#9A6200;font-size:12.5px;font-weight:800;padding:3px 10px;border-radius:50px;margin-left:6px}
.card-acts{display:flex;gap:8px;flex-wrap:wrap}
.act{flex:1;min-width:72px;padding:11px 0;border-radius:12px;border:1.5px solid rgba(63,90,48,.22);background:#fff;color:#3F5A30;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
.act.danger{border-color:rgba(200,60,40,.3);color:#B03020}
.empty{text-align:center;color:#56705F;font-size:15px;line-height:2;padding:34px 12px;background:#fff;border:1.5px dashed #BFE5D6;border-radius:18px}
/* 작성 폼 */
.form{display:none;background:#fff;border:1.5px solid rgba(63,90,48,.18);border-radius:20px;padding:22px 18px;margin-bottom:26px;box-shadow:0 6px 22px rgba(10,92,73,.08)}
.form.open{display:block}
.f-lbl{display:block;font-size:14px;font-weight:800;color:#1E5A47;margin:16px 0 7px}
.f-lbl:first-child{margin-top:0}
.f-in{width:100%;padding:14px;border:1.5px solid #DDE3D2;border-radius:12px;font-size:16px;color:#1F2A1A;outline:none;font-family:inherit;background:#FBFEFD}
.f-in:focus{border-color:#5C7A4A}
.f-row{display:flex;gap:10px}
.f-row .f-col{flex:1}
textarea.f-in{min-height:190px;line-height:1.9;font-size:16.5px;resize:vertical}
.f-hint{font-size:13px;color:#56705F;margin-top:6px;line-height:1.6}
.f-acts{display:flex;gap:10px;margin-top:20px}
.f-save{flex:2;padding:16px 0;border:none;border-radius:50px;background:#5C7A4A;color:#fff;font-size:16.5px;font-weight:800;cursor:pointer;font-family:inherit}
.f-cancel{flex:1;padding:16px 0;border:1.5px solid #DDE3D2;border-radius:50px;background:#fff;color:#56705F;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
/* 미리보기(편지지) */
.pv-bg{display:none;position:fixed;inset:0;background:rgba(20,40,32,.55);z-index:700;align-items:center;justify-content:center;padding:20px}
.pv-bg.open{display:flex}
.paper{background:#FFFDF7;border:1px solid #E8DFC8;border-radius:6px;max-width:480px;width:100%;max-height:82vh;overflow-y:auto;padding:34px 28px;box-shadow:0 24px 60px rgba(0,0,0,.3);position:relative}
.paper::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#7A9A5E,#C9A84C)}
.p-date{font-size:12.5px;color:#9A8A6A;letter-spacing:1px;margin-bottom:18px}
.p-to{font-family:'Nanum Myeongjo','Batang',serif;font-size:20px;font-weight:800;color:#3A2E1E;margin-bottom:20px}
.p-body{font-family:'Nanum Myeongjo','Batang',serif;font-size:17px;line-height:2.2;color:#2E2618;white-space:pre-wrap;margin-bottom:26px}
.p-close{width:100%;padding:14px 0;border:none;border-radius:50px;background:#1F2A1A;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#1F2A1A;color:#F5F8F0;padding:13px 26px;font-size:14px;z-index:9999;white-space:nowrap;border-radius:50px;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
<script src="/dasibom-header.js"></script>
</head>
<body>

<header data-dasibom-header data-title="마음의 유언" data-accent="#3F5A30"></header>

<div class="wrap">
  <div class="hero">
    <h1>마음의 유언<br><span style="font-size:.62em;color:#3F5A30;font-weight:700">— 미래에 전하는 편지 —</span></h1>
    <p>지금 마음을 적어두시면, 약속하신 날에 봄이가 전해드립니다.<br>언제든 다시 고치고, 미루고, 거둘 수 있어요.</p>
  </div>

  <div class="notice">💎 <b>나의 인생 전집</b> 패키지 기능(준비 중)입니다. 지금은 작성·보관까지 해보실 수 있어요. 가족에게 실제 전달(문자·이메일)은 곧 연결됩니다. 사망 여부를 추측하지 않으며, <b>오직 어르신이 정한 날짜</b>에만 전합니다.</div>

  <button class="btn-new" id="btnNew" data-bomguide="letter_new">💌 새 편지 쓰기</button>

  <div class="form" id="form">
    <label class="f-lbl">받는 분</label>
    <div class="f-row">
      <div class="f-col"><input class="f-in" id="fTo" type="text" placeholder="이름 (예: 김영희)" maxlength="20"></div>
      <div class="f-col"><input class="f-in" id="fRel" type="text" placeholder="관계 (예: 큰딸)" maxlength="12"></div>
    </div>
    <label class="f-lbl">전해드릴 날짜</label>
    <input class="f-in" id="fDate" type="date">
    <div class="f-hint">생신, 결혼기념일, 또는 먼 훗날의 어느 날 — 어떤 날이든 좋습니다.</div>
    <label class="f-lbl">편지 내용</label>
    <textarea class="f-in" id="fBody" placeholder="한 줄만 적으셔도 괜찮아요.&#10;마음은 길이로 재지 않으니까요."></textarea>
    <div class="f-acts">
      <button class="f-save" id="btnSave">저장하기</button>
      <button class="f-cancel" id="btnCancel">닫기</button>
    </div>
  </div>

  <div class="lst-title">보관 중인 편지</div>
  <div id="list"></div>
</div>

<div class="pv-bg" id="pvBg">
  <div class="paper">
    <div class="p-date" id="pvDate"></div>
    <div class="p-to" id="pvTo"></div>
    <div class="p-body" id="pvBody"></div>
    <button class="p-close" onclick="document.getElementById('pvBg').classList.remove('open')">닫기</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* 마음의 유언 — 골격(로컬 보관). 실제 전달(연락처·발송)·클라우드 보존은 전집 패키지 배포 단계.
   원칙(기획 확정): 사망 감지 안 함, "지정일 전달"만. 생존 시 수정·연기·취소 자유. */
var LS_KEY='dasibom_letters';
function load(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||[]; }catch(e){ return []; } }
function save(arr){ try{ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }catch(e){} }
function esc(s){ return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function fmt(d){ if(!d) return '-'; var p=d.split('-'); return p[0]+'년 '+Number(p[1])+'월 '+Number(p[2])+'일'; }
function popToast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; clearTimeout(t._h); t._h=setTimeout(function(){t.style.opacity=0;},2200); }

var editId=null;
function openForm(item){
  editId=item?item.id:null;
  document.getElementById('fTo').value=item?item.to:'';
  document.getElementById('fRel').value=item?item.rel:'';
  document.getElementById('fDate').value=item?item.date:'';
  document.getElementById('fBody').value=item?item.body:'';
  document.getElementById('form').classList.add('open');
  document.getElementById('fTo').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeForm(){ document.getElementById('form').classList.remove('open'); editId=null; }

document.getElementById('btnNew').addEventListener('click',function(){ openForm(null); });
document.getElementById('btnCancel').addEventListener('click',closeForm);
document.getElementById('btnSave').addEventListener('click',function(){
  var to=document.getElementById('fTo').value.trim();
  var rel=document.getElementById('fRel').value.trim();
  var date=document.getElementById('fDate').value;
  var body=document.getElementById('fBody').value.trim();
  if(!to){ popToast('받는 분 이름을 적어주세요'); return; }
  if(!date){ popToast('전해드릴 날짜를 골라주세요'); return; }
  if(!body){ popToast('짧아도 좋으니 한 줄 남겨주세요'); return; }
  var arr=load();
  if(editId){ var it=arr.find(function(x){return x.id===editId;}); if(it){ it.to=to; it.rel=rel; it.date=date; it.body=body; } popToast('편지를 고쳤습니다 ✓'); }
  else{ arr.push({ id:Date.now(), to:to, rel:rel, date:date, body:body, createdAt:new Date().toISOString().slice(0,10) }); popToast('편지를 보관했습니다 💌'); }
  save(arr); closeForm(); render();
});

function postpone(id){
  var arr=load(); var it=arr.find(function(x){return x.id===id;}); if(!it) return;
  var d=new Date(it.date+'T00:00:00'); d.setFullYear(d.getFullYear()+1);
  // 로컬 기준 YYYY-MM-DD (toISOString은 UTC라 하루 밀리는 버그)
  it.date=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
  save(arr); render(); popToast('1년 뒤로 미뤘습니다 — '+fmt(it.date));
}
function removeLetter(id){
  if(!confirm('이 편지를 거두시겠어요?\n(언제든 다시 쓰실 수 있습니다)')) return;
  save(load().filter(function(x){return x.id!==id;})); render(); popToast('편지를 거두었습니다');
}
function preview(id){
  var it=load().find(function(x){return x.id===id;}); if(!it) return;
  document.getElementById('pvDate').textContent=fmt(it.date)+'에 전해드릴 편지';
  document.getElementById('pvTo').textContent=(it.rel?it.rel+' ':'')+it.to+'에게';
  document.getElementById('pvBody').textContent=it.body;
  document.getElementById('pvBg').classList.add('open');
}
function editLetter(id){ var it=load().find(function(x){return x.id===id;}); if(it) openForm(it); }

function render(){
  var arr=load().slice().sort(function(a,b){ return a.date<b.date?-1:1; });
  var box=document.getElementById('list');
  if(!arr.length){ box.innerHTML='<div class="empty">아직 보관된 편지가 없습니다.<br>💌 <b>새 편지 쓰기</b>로 첫 마음을 남겨보세요.</div>'; return; }
  var today=new Date().toISOString().slice(0,10);
  box.innerHTML=arr.map(function(it){
    var due = it.date<=today ? '<span class="due">전달일이 되었어요</span>' : '';
    return '<div class="card">'
      +'<div class="card-to">'+(it.rel?esc(it.rel)+' ':'')+esc(it.to)+'에게'+due+'</div>'
      +'<div class="card-meta">전할 날: <b>'+fmt(it.date)+'</b> · 적은 날: '+fmt(it.createdAt)+'</div>'
      +'<div class="card-acts">'
      +'<button class="act" onclick="preview('+it.id+')">📖 읽어보기</button>'
      +'<button class="act" onclick="editLetter('+it.id+')">✏️ 고치기</button>'
      +'<button class="act" onclick="postpone('+it.id+')">🕰 1년 미루기</button>'
      +'<button class="act danger" onclick="removeLetter('+it.id+')">거두기</button>'
      +'</div></div>';
  }).join('');
}
render();
</script>
</body>
</html>
